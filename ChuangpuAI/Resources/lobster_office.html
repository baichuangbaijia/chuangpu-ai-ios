<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0}
body{background:#0D0D1A;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),cx=c.getContext('2d');
const W=window.innerWidth,H=340;
c.width=W;c.height=H;

// ========== 配置 ==========
const BG='#0D0D1A';
const ANIM_FPS=10;
const FRAME_MS=1000/ANIM_FPS;

// 6个Agent
const AGENT_DEF=[
  {id:'pm',  band:'#EF4444',body:'#E85D3A',dk:'#B34520'},
  {id:'file',band:'#3B82F6',body:'#E8713A',dk:'#B35A28'},
  {id:'comp',band:'#10B981',body:'#E8713A',dk:'#B35A28'},
  {id:'app', band:'#F97316',body:'#E8713A',dk:'#B35A28'},
  {id:'brow',band:'#8B5CF6',body:'#E8713A',dk:'#B35A28'},
  {id:'srch',band:'#06B6D4',body:'#E8713A',dk:'#B35A28'},
];

// 布局：dy是桌面Y坐标，角色坐在桌面后方(屏幕上方)
const BACK_DY=H*0.42, FRONT_DY=H*0.75;
const BK=0.55, FT=0.82; // 缩放
const bDesks=[{x:W*.18,dy:BACK_DY},{x:W*.42,dy:BACK_DY},{x:W*.64,dy:BACK_DY}];
const fDesks=[{x:W*.22,dy:FRONT_DY},{x:W*.48,dy:FRONT_DY},{x:W*.72,dy:FRONT_DY}];
const coffeeZ={x:W*.90,y:FRONT_DY-10};
const gymZ={x:W*.90,y:BACK_DY-15};
const wcZ={x:W*.08,y:FRONT_DY+20};

// 创建龙虾
const L=AGENT_DEF.map((a,i)=>{
  const isBk=i<3, di=isBk?i:i-3;
  const desk=isBk?bDesks[di]:fDesks[di];
  const sc=isBk?BK:FT;
  // 角色Y：桌面Y - 偏移，让身体下半被桌面遮挡
  const sitY=desk.dy-6*sc;
  return{...a,x:desk.x,y:sitY,hx:desk.x,hy:sitY,
    desk,isBk,sc,st:'sit_work',dir:1,
    fr:0,ft:0,tx:desk.x,ty:sitY,mv:false,
    arrAct:null,actT:8000+Math.random()*8000,
    blkT:1500+Math.random()*2000,blk:false,
    scr:['code','files','chat','game','browser','stats'][i]
  };
});

// ========== 帧动画 ==========
function tickF(l,dt){
  l.ft+=dt;
  if(l.ft>=FRAME_MS){
    l.ft-=FRAME_MS;
    const mx=l.st==='walk'?4:l.st.startsWith('sit')?3:2;
    l.fr=(l.fr+1)%mx;
  }
}

// ========== 圆角矩形 ==========
function rr(x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

// ========== 背景 ==========
function drawBg(t){
  cx.fillStyle=BG;cx.fillRect(0,0,W,H);
  cx.strokeStyle='rgba(124,58,237,0.04)';cx.lineWidth=0.5;
  for(let i=0;i<W;i+=30){cx.beginPath();cx.moveTo(i,0);cx.lineTo(i,H);cx.stroke()}
  for(let i=0;i<H;i+=30){cx.beginPath();cx.moveTo(0,i);cx.lineTo(W,i);cx.stroke()}
  // 区域标签
  cx.textAlign='center';cx.font='bold 8px sans-serif';
  cx.fillStyle='rgba(124,58,237,0.3)';
  cx.fillText('COFFEE',coffeeZ.x,coffeeZ.y-28);
  cx.fillText('GYM',gymZ.x,gymZ.y-22);
  cx.fillText('WC',wcZ.x,wcZ.y-28);
}

// ========== 工位背景层（椅背+显示器）==========
function drawDeskBg(desk,sc,scrType,t){
  const dx=desk.x,dy=desk.dy;
  cx.save();cx.translate(dx,dy);cx.scale(sc,sc);
  
  // 椅子靠背
  cx.fillStyle='#181832';cx.strokeStyle='rgba(124,58,237,0.18)';cx.lineWidth=0.7;
  rr(-14,2,28,22,6);cx.fill();cx.stroke();
  // 椅子坐垫
  cx.fillStyle='#1c1c3c';rr(-15,22,30,5,3);cx.fill();
  // 轮子
  cx.fillStyle='#111';
  [-10,0,10].forEach(ox=>{cx.beginPath();cx.arc(ox,29,1.8,0,6.28);cx.fill()});
  
  // 显示器支架
  cx.fillStyle='#181830';cx.fillRect(-2,-6,4,10);
  // 显示器底座
  rr(-7,-3,14,3,1);cx.fill();
  
  // 显示器
  cx.fillStyle='#0a0a18';cx.strokeStyle='rgba(124,58,237,0.45)';cx.lineWidth=0.7;
  rr(-18,-34,36,26,3);cx.fill();cx.stroke();
  // 屏幕
  cx.save();cx.beginPath();rr(-16,-32,32,22,2);cx.clip();
  drawScr(-16,-32,32,22,scrType,t);
  cx.restore();
  
  // 桌腿
  cx.fillStyle='#14142a';cx.fillRect(-42,2,3,28);cx.fillRect(39,2,3,28);
  
  cx.restore();
}

function drawScr(sx,sy,sw,sh,type,t){
  switch(type){
    case 'code':
      cx.fillStyle='#0d1117';cx.fillRect(sx,sy,sw,sh);
      cx.font='2.2px monospace';
      ['const r=await','fetch(url);','if(!r.ok)','throw err;','return d;'].forEach((l,i)=>{
        cx.fillStyle=i%2?'rgba(0,255,100,0.5)':'rgba(0,200,255,0.5)';
        cx.fillText(l.substring(0,7+((Math.sin(t*0.001+i)*2)|0)),sx+1,sy+4+i*4);
      });
      if(Math.sin(t*0.004)>0){cx.fillStyle='#0f0';cx.fillRect(sx+20,sy+11,1.5,2)}
      break;
    case 'files':
      cx.fillStyle='#1a1a2e';cx.fillRect(sx,sy,sw,sh);
      cx.font='2.2px sans-serif';cx.fillStyle='rgba(59,130,246,0.55)';
      ['report.pdf','data.xlsx','contract.docx','project/'].forEach((f,i)=>cx.fillText(f,sx+1,sy+4+i*5));
      break;
    case 'chat':
      cx.fillStyle='#1e1e30';cx.fillRect(sx,sy,sw,sh);
      cx.fillStyle='rgba(124,58,237,0.35)';rr(sx+1,sy+2,sw*0.6,3,1);cx.fill();
      cx.fillStyle='rgba(59,130,246,0.35)';rr(sx+3,sy+8,sw*0.5,3,1);cx.fill();
      cx.fillStyle='rgba(124,58,237,0.35)';rr(sx+1,sy+14,sw*0.55,3,1);cx.fill();
      break;
    case 'game':
      cx.fillStyle='#0a0a2e';cx.fillRect(sx,sy,sw,sh);
      cx.fillStyle='rgba(16,185,129,0.7)';
      cx.beginPath();cx.arc(sx+9+Math.sin(t*0.003)*5,sy+12,3,0,6.28);cx.fill();
      cx.fillStyle='#fff';cx.font='2.2px sans-serif';cx.fillText('GAME',sx+1,sy+3);
      break;
    case 'browser':
      cx.fillStyle='#1a1a2e';cx.fillRect(sx,sy,sw,sh);
      cx.fillStyle='#333';cx.fillRect(sx,sy,sw,3);
      cx.fillStyle='rgba(255,255,255,0.15)';
      for(let i=0;i<3;i++) cx.fillRect(sx+1,sy+5+i*6,sw-2,3);
      break;
    case 'stats':
      cx.fillStyle='#0d0d1a';cx.fillRect(sx,sy,sw,sh);
      cx.strokeStyle='rgba(6,182,212,0.6)';cx.lineWidth=1;cx.beginPath();
      for(let i=0;i<8;i++){cx.lineTo(sx+2+i*4,sy+14-Math.sin(t*0.002+i*0.8)*7)}
      cx.stroke();
      break;
  }
}

// ========== 工位前景层（桌面+键盘，遮挡角色下半身）==========
function drawDeskFg(desk,sc){
  cx.save();cx.translate(desk.x,desk.dy);cx.scale(sc,sc);
  // 桌面 - 厚实的桌面
  cx.fillStyle='#1a1a36';cx.strokeStyle='rgba(124,58,237,0.3)';cx.lineWidth=0.7;
  rr(-46,4,92,12,3);cx.fill();cx.stroke();
  // 桌面高光
  cx.fillStyle='rgba(124,58,237,0.06)';rr(-44,5,88,3,2);cx.fill();
  // 键盘
  cx.fillStyle='#222244';rr(-15,7,30,4,1);cx.fill();
  cx.fillStyle='rgba(124,58,237,0.08)';
  for(let r=0;r<3;r++) for(let c2=0;c2<7;c2++) cx.fillRect(-13+c2*4,8+r*1.2,2.5,0.8);
  // 鼠标
  cx.fillStyle='#222244';rr(18,7,5,4,2);cx.fill();
  // 小植物
  cx.fillStyle='#2a2a4a';rr(-40,0,5,6,1);cx.fill();
  cx.fillStyle='rgba(16,185,129,0.35)';cx.beginPath();cx.arc(-37.5,-1,3.5,0,6.28);cx.fill();
  cx.restore();
}

// ========== 咖啡机 ==========
function drawCoffee(px,py){
  cx.save();cx.translate(px,py);
  cx.fillStyle='#1E1E3A';cx.strokeStyle='rgba(124,58,237,0.25)';cx.lineWidth=0.7;
  rr(-16,-20,32,32,4);cx.fill();cx.stroke();
  cx.fillStyle='#111128';cx.fillRect(-5,-2,10,7);
  cx.fillStyle='#ddd';rr(-4,7,8,6,1);cx.fill();
  // 蒸汽
  cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=0.6;
  const t=Date.now();
  for(let i=0;i<3;i++){
    cx.beginPath();cx.moveTo(-2+i*2,5);
    cx.quadraticCurveTo(-2+i*2+Math.sin(t*0.003+i)*2,-4,-2+i*2,-8);cx.stroke();
  }
  cx.restore();
}

// ========== 跑步机 ==========
function drawGym(gx,gy){
  cx.save();cx.translate(gx,gy);
  cx.fillStyle='#1E1E3A';cx.strokeStyle='rgba(124,58,237,0.25)';cx.lineWidth=0.7;
  rr(-20,-8,40,18,4);cx.fill();cx.stroke();
  // 移动纹理
  cx.strokeStyle='rgba(124,58,237,0.08)';cx.lineWidth=0.4;
  const off=(Date.now()*0.008)%8;
  for(let i=-18;i<20;i+=8){const lx=i+off;if(lx>-18&&lx<18){cx.beginPath();cx.moveTo(lx,-6);cx.lineTo(lx,6);cx.stroke()}}
  // 扶手
  cx.strokeStyle='rgba(124,58,237,0.35)';cx.lineWidth=1.3;
  cx.beginPath();cx.moveTo(-18,-8);cx.lineTo(-18,-22);cx.stroke();
  cx.beginPath();cx.moveTo(18,-8);cx.lineTo(18,-22);cx.stroke();
  cx.fillStyle='#2a2a4a';rr(-8,-24,16,5,2);cx.fill();
  cx.restore();
}

// ========== 卫生间 ==========
function drawWC(wx,wy){
  cx.save();cx.translate(wx,wy);
  cx.fillStyle='#12122a';cx.strokeStyle='rgba(124,58,237,0.18)';cx.lineWidth=0.5;
  rr(-16,-22,32,40,3);cx.fill();cx.stroke();
  cx.fillStyle='#ddd';cx.beginPath();cx.ellipse(0,6,9,11,0,0,6.28);cx.fill();
  cx.fillStyle='#eee';cx.beginPath();cx.ellipse(0,4,6,7,0,0,6.28);cx.fill();
  cx.fillStyle='#ccc';cx.beginPath();cx.ellipse(0,-1,7,3.5,0,3.14,0);cx.fill();
  cx.fillStyle='#bbb';rr(-6,-18,12,7,2);cx.fill();
  cx.restore();
}

// ========== 龙虾绘制 ==========

// 背面视图（坐着，面对屏幕，背对用户）
function drawBack(l,t){
  const s=l.sc,f=l.fr;
  const typeAnim=l.st==='sit_work'?Math.sin(t*0.008+f*1.2)*2:0;
  const breath=Math.sin(t*0.003+f*0.8)*0.7;
  
  cx.save();cx.translate(l.x,l.y+breath);cx.scale(s,s);
  
  // 投影
  cx.fillStyle='rgba(0,0,0,0.18)';cx.beginPath();cx.ellipse(0,18,14,3.5,0,0,6.28);cx.fill();
  
  // 身体背面（深色壳）
  cx.fillStyle=l.dk;rr(-12,-6,24,22,8);cx.fill();
  // 身体侧边高光
  cx.fillStyle='rgba(255,255,255,0.04)';rr(-12,-6,8,22,4);cx.fill();
  
  // 彩色领环（关键识别特征，从背面可见）
  cx.fillStyle=l.band;rr(-13,-1,26,5,2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.18)';rr(-11,0,22,1.5,1);cx.fill();
  
  // 头部（背面）
  cx.fillStyle=l.body;cx.beginPath();cx.arc(0,-12,10,0,6.28);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.06)';cx.beginPath();cx.arc(-2,-14,4,0,6.28);cx.fill();
  
  // 触须
  cx.strokeStyle=l.dk;cx.lineWidth=1.1;cx.lineCap='round';
  const wb=Math.sin(t*0.004)*2;
  cx.beginPath();cx.moveTo(-3,-21);cx.quadraticCurveTo(-7+wb,-28,-5+wb,-33);cx.stroke();
  cx.beginPath();cx.moveTo(3,-21);cx.quadraticCurveTo(7-wb,-28,5-wb,-33);cx.stroke();
  
  // 钳子（从背面两侧伸出，打字时微动）
  const ca=typeAnim*0.12;
  cx.save();cx.translate(-13,-1);cx.rotate(-0.25+ca);
  cx.strokeStyle=l.body;cx.lineWidth=2.2;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(-5,3);cx.lineTo(-9,0);cx.stroke();
  cx.beginPath();cx.moveTo(-5,3);cx.lineTo(-9,6);cx.stroke();
  cx.restore();
  cx.save();cx.translate(13,-1);cx.rotate(0.25-ca);
  cx.strokeStyle=l.body;cx.lineWidth=2.2;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(5,3);cx.lineTo(9,0);cx.stroke();
  cx.beginPath();cx.moveTo(5,3);cx.lineTo(9,6);cx.stroke();
  cx.restore();
  
  // 打字特效
  if(l.st==='sit_work'&&Math.sin(t*0.012)>0.4){
    cx.strokeStyle='rgba(124,58,237,0.25)';cx.lineWidth=0.5;
    cx.beginPath();cx.moveTo(-7,8);cx.lineTo(-7,12);cx.stroke();
    cx.beginPath();cx.moveTo(7,8);cx.lineTo(7,12);cx.stroke();
  }
  
  cx.restore();
}

// 侧面视图（走路）
function drawWalk(l,t){
  const s=l.sc,f=l.fr,d=l.dir;
  const bob=[0,-1.5,0,-1.5][f]*s;
  // 腿的位置（4帧走路循环）
  const legY=[
    [[-5,10,-9,17],[5,10,1,17],[-1,10,5,17]],
    [[-3,10,-5,17],[3,10,-1,17],[0,10,2,17]],
    [[5,10,9,17],[-5,10,-1,17],[-1,10,-5,17]],
    [[3,10,5,17],[-3,10,1,17],[0,10,-2,17]]
  ];
  
  cx.save();cx.translate(l.x,l.y+bob);cx.scale(d*s,s);
  
  // 投影
  cx.fillStyle='rgba(0,0,0,0.12)';cx.beginPath();cx.ellipse(0,18,12,3,0,0,6.28);cx.fill();
  
  // 尾巴
  cx.fillStyle=l.dk;cx.beginPath();
  cx.moveTo(-2,8);cx.quadraticCurveTo(-7,14,-5,20);
  cx.quadraticCurveTo(-1,18,0,16);
  cx.quadraticCurveTo(1,18,3,20);
  cx.quadraticCurveTo(5,14,2,8);cx.fill();
  
  // 腿
  cx.strokeStyle=l.dk;cx.lineWidth=1.4;cx.lineCap='round';
  legY[f].forEach(leg=>{cx.beginPath();cx.moveTo(leg[0],leg[1]);cx.lineTo(leg[2],leg[3]);cx.stroke()});
  
  // 身体
  cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,3,12,10,0,0,6.28);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.08)';cx.beginPath();cx.ellipse(-2,0,4,3.5,-0.3,0,6.28);cx.fill();
  
  // 彩色领环
  cx.fillStyle=l.band;rr(-13,0,26,4.5,2);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.15)';rr(-11,0.5,22,1.2,1);cx.fill();
  
  // 头
  cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,-7,9,8,0,0,6.28);cx.fill();
  
  // 触须
  const wb=Math.sin(t*0.005)*1.5;
  cx.strokeStyle=l.dk;cx.lineWidth=0.9;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-3,-14);cx.quadraticCurveTo(-5+wb,-20,-4+wb,-24);cx.stroke();
  cx.beginPath();cx.moveTo(3,-14);cx.quadraticCurveTo(5-wb,-20,4-wb,-24);cx.stroke();
  
  // 眼睛（侧面一个）
  const ey=l.blk?0.2:1;
  cx.fillStyle='#fff';cx.save();cx.translate(3,-8);cx.scale(1,ey);
  cx.beginPath();cx.arc(0,0,2.8,0,6.28);cx.fill();cx.restore();
  if(!l.blk){cx.fillStyle='#111';cx.beginPath();cx.arc(4,-8,1.3,0,6.28);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.6)';cx.beginPath();cx.arc(3.5,-9,0.5,0,6.28);cx.fill()}
  
  // 钳子（前方的）
  const cSwing=Math.sin(t*0.008+f)*0.15;
  cx.save();cx.translate(10,0);cx.rotate(cSwing);
  cx.strokeStyle=l.body;cx.lineWidth=2.2;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(7,2);cx.lineTo(10,-1);cx.stroke();
  cx.beginPath();cx.moveTo(7,2);cx.lineTo(10,5);cx.stroke();
  cx.restore();
  
  cx.restore();
}

// 特殊状态
function drawSpecial(l,t){
  const s=l.sc;
  const breath=Math.sin(t*0.003)*0.8;
  cx.save();cx.translate(l.x,l.y+breath);cx.scale(s,s);
  
  // 投影
  cx.fillStyle='rgba(0,0,0,0.12)';cx.beginPath();cx.ellipse(0,18,12,3,0,0,6.28);cx.fill();
  
  if(l.st==='coffee'){
    // 站立正面偏侧，拿咖啡
    // 腿
    cx.strokeStyle=l.dk;cx.lineWidth=1.4;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-4,10);cx.lineTo(-6,17);cx.stroke();
    cx.beginPath();cx.moveTo(4,10);cx.lineTo(6,17);cx.stroke();
    // 身体
    cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,3,11,9,0,0,6.28);cx.fill();
    // 领环
    cx.fillStyle=l.band;rr(-12,0,24,4.5,2);cx.fill();
    // 头
    cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,-7,8,7,0,0,6.28);cx.fill();
    // 触须
    cx.strokeStyle=l.dk;cx.lineWidth=0.9;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-3,-13);cx.quadraticCurveTo(-5,-18,-4,-22);cx.stroke();
    cx.beginPath();cx.moveTo(3,-13);cx.quadraticCurveTo(5,-18,4,-22);cx.stroke();
    // 眼睛
    cx.fillStyle='#fff';cx.beginPath();cx.arc(-3,-8,2.2,0,6.28);cx.fill();
    cx.beginPath();cx.arc(3,-8,2.2,0,6.28);cx.fill();
    cx.fillStyle='#111';cx.beginPath();cx.arc(-2.5,-8,1,0,6.28);cx.fill();
    cx.beginPath();cx.arc(3.5,-8,1,0,6.28);cx.fill();
    // 咖啡杯
    cx.fillStyle='#ddd';rr(8,-3,5,7,1);cx.fill();
    cx.fillStyle='rgba(139,90,43,0.5)';cx.fillRect(9,-2,3,2);
    // 蒸汽
    cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=0.5;
    cx.beginPath();cx.moveTo(10.5,-5);cx.quadraticCurveTo(11+Math.sin(t*0.005)*1.5,-9,10.5,-12);cx.stroke();
    
  } else if(l.st==='exercise'){
    // 跑步姿势
    const rf=l.fr%4;
    const runBob=[0,-1,0,-1][rf];
    cx.translate(0,runBob);
    // 腿（交替）
    cx.strokeStyle=l.dk;cx.lineWidth=1.4;cx.lineCap='round';
    const legAlt=rf%2===0;
    cx.beginPath();cx.moveTo(-3,10);cx.lineTo(legAlt?-7:1,17);cx.stroke();
    cx.beginPath();cx.moveTo(3,10);cx.lineTo(legAlt?-1:7,17);cx.stroke();
    // 身体
    cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,3,11,9,0,0,6.28);cx.fill();
    // 领环
    cx.fillStyle=l.band;rr(-12,0,24,4.5,2);cx.fill();
    // 头
    cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,-7,8,7,0,0,6.28);cx.fill();
    // 触须
    cx.strokeStyle=l.dk;cx.lineWidth=0.9;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-3,-13);cx.quadraticCurveTo(-4,-18,-3,-22);cx.stroke();
    cx.beginPath();cx.moveTo(3,-13);cx.quadraticCurveTo(4,-18,3,-22);cx.stroke();
    // 眼睛
    cx.fillStyle='#fff';cx.beginPath();cx.arc(-3,-8,2.2,0,6.28);cx.fill();
    cx.beginPath();cx.arc(3,-8,2.2,0,6.28);cx.fill();
    cx.fillStyle='#111';cx.beginPath();cx.arc(-2.5,-8,1,0,6.28);cx.fill();
    cx.beginPath();cx.arc(3.5,-8,1,0,6.28);cx.fill();
    // 汗珠
    if(Math.sin(t*0.006)>0){
      cx.fillStyle='rgba(59,130,246,0.4)';
      cx.beginPath();cx.arc(7+Math.sin(t*0.008)*2,-3,1.2,0,6.28);cx.fill();
    }
    
  } else if(l.st==='sleep'){
    // 趴在桌上打盹 - 俯卧姿势
    // 身体
    cx.fillStyle=l.dk;rr(-11,-4,22,20,7);cx.fill();
    // 领环
    cx.fillStyle=l.band;rr(-12,0,24,4.5,2);cx.fill();
    // 头趴下
    cx.fillStyle=l.body;cx.beginPath();cx.ellipse(0,-8,9,6,0.1,0,6.28);cx.fill();
    // Zzz
    cx.font='7px sans-serif';cx.textAlign='left';cx.fillStyle='rgba(255,255,255,0.35)';
    const zy=-16+Math.sin(t*0.002)*3;
    cx.fillText('z',8,zy);cx.font='5px sans-serif';cx.fillText('z',14,zy-4);
    cx.font='3px sans-serif';cx.fillText('z',18,zy-7);
    
  } else if(l.st==='toilet'){
    // 在卫生间 - 门关着
    cx.fillStyle='#1a1a35';rr(-14,-18,28,34,3);cx.fill();
    cx.strokeStyle='rgba(124,58,237,0.2)';cx.lineWidth=0.5;
    rr(-14,-18,28,34,3);cx.stroke();
    // 把手
    cx.fillStyle='#444';cx.beginPath();cx.arc(9,2,1.8,0,6.28);cx.fill();
    // 占用
    cx.fillStyle='#EF4444';cx.font='bold 4px sans-serif';cx.textAlign='center';
    cx.fillText('BUSY',0,-6);
  }
  
  cx.restore();
}

// 绘制龙虾（选择视图）
function drawLob(l,t){
  if(l.st==='sit_work'||l.st==='sit_idle') drawBack(l,t);
  else if(l.st==='walk') drawWalk(l,t);
  else drawSpecial(l,t);
}

// ========== AI行为 ==========
let lastAI=0;
function ai(t){
  if(t-lastAI<4500)return;lastAI=t;
  const idle=L.filter(l=>(l.st==='sit_work'||l.st==='sit_idle')&&!l.mv);
  if(!idle.length)return;
  const l=idle[(Math.random()*idle.length)|0];
  const r=Math.random();
  if(r<0.25){l.st='sit_work';l.actT=6000+Math.random()*10000}
  else if(r<0.40){mvTo(l,coffeeZ,'coffee')}
  else if(r<0.52){mvTo(l,gymZ,'exercise')}
  else if(r<0.62){mvTo(l,wcZ,'toilet')}
  else if(r<0.72){l.st='sleep';l.actT=6000+Math.random()*6000}
  else if(r<0.82){l.st='sit_idle';l.actT=4000+Math.random()*4000}
  else{l.st='sit_work';l.actT=8000+Math.random()*8000}
}
function mvTo(l,z,act){
  l.tx=z.x;l.ty=z.y-8*l.sc;l.mv=true;l.st='walk';
  l.dir=l.tx>l.x?1:-1;l.arrAct=act;
}
function goHome(l){
  l.tx=l.hx;l.ty=l.hy;l.mv=true;l.st='walk';
  l.dir=l.tx>l.x?1:-1;l.arrAct='sit_work';l.actT=8000+Math.random()*8000;
}

// ========== 更新 ==========
function update(dt,t){
  L.forEach(l=>{
    tickF(l,dt);
    l.blkT-=dt;if(l.blkT<=0){l.blk=!l.blk;l.blkT=l.blk?80:1500+Math.random()*3000}
    if(l.actT>0&&!l.mv){l.actT-=dt;if(l.actT<=0)goHome(l)}
    if(!l.mv)return;
    const dx=l.tx-l.x,dy=l.ty-l.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<3){l.x=l.tx;l.y=l.ty;l.mv=false;
      if(l.arrAct){l.st=l.arrAct;l.arrAct=null;l.actT=5000+Math.random()*5000;l.fr=0}
      return;
    }
    const spd=1.1*(l.isBk?0.7:1);
    l.x+=dx/d*spd;l.y+=dy/d*spd;
    if(Math.abs(dx)>1)l.dir=dx>0?1:-1;
  });
}

// ========== 主循环 ==========
let lt=0;
function loop(t){
  const dt=lt?t-lt:16;lt=t;
  update(dt,t);ai(t);
  
  drawBg(t);
  
  // 工位背景层
  bDesks.forEach((d,i)=>drawDeskBg(d,BK,L[i].scr,t));
  fDesks.forEach((d,i)=>drawDeskBg(d,FT,L[i+3].scr,t));
  
  // 区域设施
  drawCoffee(coffeeZ.x,coffeeZ.y);
  drawGym(gymZ.x,gymZ.y);
  drawWC(wcZ.x,wcZ.y);
  
  // 龙虾（按Y排序）
  [...L].sort((a,b)=>a.y-b.y).forEach(l=>drawLob(l,t));
  
  // 工位前景层（桌面遮挡角色下半身）
  L.forEach(l=>{
    if(l.st.startsWith('sit')) drawDeskFg(l.desk,l.sc);
  });
  
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
