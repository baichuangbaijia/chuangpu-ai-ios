<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>*{margin:0;padding:0;overflow:hidden}body{background:#0D0D1A;touch-action:none}
#ld{position:fixed;top:0;left:0;width:100%;height:100%;background:#0D0D1A;display:flex;align-items:center;justify-content:center;color:#7C3AED;font-family:-apple-system,sans-serif;font-size:14px;z-index:99;flex-direction:column;gap:8px}
#ld .dot{width:24px;height:24px;border:3px solid #7C3AED;border-top-color:transparent;border-radius:50%;animation:sp 0.8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="ld"><div class="dot"></div>Loading 3D Office...</div>
<script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
<script>
window.addEventListener('load',()=>{document.getElementById('ld').style.display='none';init()});

function init(){
const W=window.innerWidth,H=window.innerHeight;
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0D0D1A);
scene.fog=new THREE.FogExp2(0x0D0D1A,0.016);

const camera=new THREE.PerspectiveCamera(42,W/H,0.1,100);
camera.position.set(0,8,11);
camera.lookAt(0,1.2,0);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;
document.body.appendChild(renderer.domElement);

// ===== 灯光 =====
scene.add(new THREE.AmbientLight(0x2a2a4e,0.8));
const dLight=new THREE.DirectionalLight(0xffffff,1.0);
dLight.position.set(4,10,6);dLight.castShadow=true;
dLight.shadow.mapSize.set(2048,2048);
dLight.shadow.camera.near=1;dLight.shadow.camera.far=30;
dLight.shadow.camera.left=-12;dLight.shadow.camera.right=12;
dLight.shadow.camera.top=12;dLight.shadow.camera.bottom=-12;
scene.add(dLight);
const pLight1=new THREE.PointLight(0x7C3AED,0.7,18);pLight1.position.set(-6,5,-4);scene.add(pLight1);
const pLight2=new THREE.PointLight(0x3B82F6,0.5,18);pLight2.position.set(6,5,4);scene.add(pLight2);
const pLight3=new THREE.PointLight(0x10B981,0.4,14);pLight3.position.set(0,4,-6);scene.add(pLight3);

// ===== 地板 =====
const floor=new THREE.Mesh(
  new THREE.PlaneGeometry(30,22),
  new THREE.MeshStandardMaterial({color:0x111128,roughness:0.85,metalness:0.15})
);
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const grid=new THREE.GridHelper(30,60,0x7C3AED,0x1a1a3e);
grid.position.y=0.01;grid.material.opacity=0.1;grid.material.transparent=true;scene.add(grid);

// ===== 材质 =====
const M={
  shell:new THREE.MeshStandardMaterial({color:0xE8402E,roughness:0.4,metalness:0.1}),
  shellDk:new THREE.MeshStandardMaterial({color:0xC0351F,roughness:0.45}),
  shellLt:new THREE.MeshStandardMaterial({color:0xF05540,roughness:0.35}),
  uniform:new THREE.MeshStandardMaterial({color:0x1E3A5F,roughness:0.55,metalness:0.15}),
  uniformLt:new THREE.MeshStandardMaterial({color:0x2B5080,roughness:0.5}),
  deskTop:new THREE.MeshStandardMaterial({color:0x2A2A3E,roughness:0.4,metalness:0.2}),
  deskLeg:new THREE.MeshStandardMaterial({color:0x3A3A52,roughness:0.35,metalness:0.15}),
  chair:new THREE.MeshStandardMaterial({color:0x1A1A2E,roughness:0.5,metalness:0.3}),
  monitor:new THREE.MeshStandardMaterial({color:0x1A1A2E,roughness:0.2,metalness:0.5}),
  screen:new THREE.MeshStandardMaterial({color:0x1E3A5F,emissive:0x1E3A5F,emissiveIntensity:0.6}),
  silver:new THREE.MeshStandardMaterial({color:0x9CA3AF,roughness:0.35,metalness:0.6}),
  black:new THREE.MeshStandardMaterial({color:0x1A1A2E,roughness:0.6,metalness:0.3}),
  eyeW:new THREE.MeshStandardMaterial({color:0xFFFFFF,roughness:0.2}),
  eyeB:new THREE.MeshStandardMaterial({color:0x111111}),
  eyeHL:new THREE.MeshStandardMaterial({color:0xFFFFFF,emissive:0xFFFFFF,emissiveIntensity:0.3}),
  blush:new THREE.MeshStandardMaterial({color:0xFF8888,transparent:true,opacity:0.35}),
  clawIn:new THREE.MeshStandardMaterial({color:0xD14E2B,roughness:0.4}),
  white:new THREE.MeshStandardMaterial({color:0xF0F0F0,roughness:0.4}),
};
function collarMat(c){return new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:0.6,roughness:0.3,metalness:0.3})}

// ===== 创建龙虾（正常比例，坐着比屏幕高）=====
// 龙虾整体高度约1.5（坐姿），头顶到1.8，比显示器顶部1.72高
function createLobster(bandColor){
  const g=new THREE.Group();
  
  // === 蓝色工装上身 ===
  const torso=new THREE.Mesh(
    new THREE.BoxGeometry(0.7,0.8,0.5),
    M.uniform
  );
  torso.position.set(0,1.1,0);torso.castShadow=true;g.add(torso);
  
  // 工装前面板
  const tFront=new THREE.Mesh(new THREE.BoxGeometry(0.62,0.72,0.02),M.uniformLt);
  tFront.position.set(0,1.1,0.25);g.add(tFront);
  
  // === 红色龙虾头（大而圆，最显眼）===
  const headGeo=new THREE.SphereGeometry(0.38,12,10);
  headGeo.scale(1.0,0.9,1.05);
  const head=new THREE.Mesh(headGeo,M.shell);
  head.position.set(0,1.82,0.08);head.castShadow=true;g.add(head);
  
  // 额剑（头前尖刺）
  const rostrum=new THREE.Mesh(new THREE.ConeGeometry(0.03,0.35,4),M.shellDk);
  rostrum.position.set(0,2.0,0.38);rostrum.rotation.x=-0.5;g.add(rostrum);
  
  // 眼柄+大眼睛
  [-1,1].forEach(s=>{
    const stalk=new THREE.Mesh(
      new THREE.CylinderGeometry(0.028,0.035,0.22,6),
      M.shellDk
    );
    stalk.position.set(s*0.2,2.02,0.25);
    stalk.rotation.x=-0.35;stalk.rotation.z=s*0.12;
    g.add(stalk);
    
    // 大白眼睛（可爱风关键）
    const ew=new THREE.Mesh(new THREE.SphereGeometry(0.1,10,8),M.eyeW);
    ew.position.set(s*0.22,2.15,0.35);g.add(ew);
    
    // 瞳孔
    const ep=new THREE.Mesh(new THREE.SphereGeometry(0.055,8,8),M.eyeB);
    ep.position.set(s*0.22,2.15,0.44);g.add(ep);
    
    // 高光
    const hl=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),M.eyeHL);
    hl.position.set(s*0.18,2.19,0.44);g.add(hl);
    
    // 腮红
    const bl=new THREE.Mesh(new THREE.SphereGeometry(0.08,6,6),M.blush);
    bl.position.set(s*0.36,1.78,0.22);bl.scale.set(1.2,0.6,0.5);g.add(bl);
  });
  
  // 短触须（可爱风）
  [-1,1].forEach(s=>{
    const ant=new THREE.Mesh(
      new THREE.CylinderGeometry(0.014,0.007,0.4,4),
      M.shellDk
    );
    ant.position.set(s*0.12,2.08,0.12);
    ant.rotation.z=s*0.25;ant.rotation.x=-0.5;
    g.add(ant);
  });
  
  // === 彩色领环 + 领带 ===
  const collar=new THREE.Mesh(new THREE.TorusGeometry(0.38,0.07,8,16),collarMat(bandColor));
  collar.position.set(0,1.46,0);collar.rotation.x=Math.PI/2;g.add(collar);
  const tie=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.25,0.05),collarMat(bandColor));
  tie.position.set(0,1.28,0.28);tie.rotation.x=0.08;g.add(tie);
  
  // === 大虾钳（夸张可爱，龙虾标志）===
  const lClawG=new THREE.Group();
  lClawG.position.set(-0.48,1.15,0.1);
  const lArm=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.04,0.4,6),M.shell);
  lArm.position.set(-0.12,-0.06,0);lArm.rotation.z=0.5;lClawG.add(lArm);
  const lCB=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,6),M.shell);
  lCB.scale.set(1.8,0.55,1.0);lCB.position.set(-0.32,-0.22,0);lClawG.add(lCB);
  const lJU=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.04,0.1),M.shellDk);
  lJU.position.set(-0.46,-0.16,0);lJU.rotation.z=0.1;lClawG.add(lJU);
  const lJD=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.04,0.1),M.shellDk);
  lJD.position.set(-0.46,-0.26,0);lJD.rotation.z=-0.08;lClawG.add(lJD);
  for(let i=0;i<4;i++){const th=new THREE.Mesh(new THREE.ConeGeometry(0.014,0.045,3),M.clawIn);th.position.set(-0.38+i*0.06,-0.19,0);lClawG.add(th);}
  g.add(lClawG);
  
  const rClawG=new THREE.Group();
  rClawG.position.set(0.48,1.15,0.1);
  const rArm=new THREE.Mesh(new THREE.CylinderGeometry(0.055,0.04,0.4,6),M.shell);
  rArm.position.set(0.12,-0.06,0);rArm.rotation.z=-0.5;rClawG.add(rArm);
  const rCB=new THREE.Mesh(new THREE.SphereGeometry(0.16,8,6),M.shell);
  rCB.scale.set(1.8,0.55,1.0);rCB.position.set(0.32,-0.22,0);rClawG.add(rCB);
  const rJU=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.04,0.1),M.shellDk);
  rJU.position.set(0.46,-0.16,0);rJU.rotation.z=-0.1;rClawG.add(rJU);
  const rJD=new THREE.Mesh(new THREE.BoxGeometry(0.22,0.04,0.1),M.shellDk);
  rJD.position.set(0.46,-0.26,0);rJD.rotation.z=0.08;rClawG.add(rJD);
  for(let i=0;i<4;i++){const th=new THREE.Mesh(new THREE.ConeGeometry(0.014,0.045,3),M.clawIn);th.position.set(0.38-i*0.06,-0.19,0);rClawG.add(th);}
  g.add(rClawG);
  
  // === 扇形尾巴 ===
  const tailFan=new THREE.Group();
  tailFan.position.set(0,0.85,-0.3);
  for(let i=0;i<5;i++){
    const a=(i-2)*0.3;
    const tp=new THREE.Mesh(new THREE.SphereGeometry(0.1,6,4),M.shellLt);
    tp.scale.set(0.4,0.7,1.2);tp.position.set(Math.sin(a)*0.07,0.03,-Math.cos(a)*0.14);
    tp.rotation.x=a*0.25;tailFan.add(tp);
  }
  g.add(tailFan);
  
  // === 腿（坐姿弯曲）===
  [-1,1].forEach(s=>{
    const thigh=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.04,0.3,5),M.uniform);
    thigh.position.set(s*0.18,0.42,0.1);thigh.rotation.x=0.4;thigh.rotation.z=s*0.12;g.add(thigh);
    const shin=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.03,0.3,5),M.shell);
    shin.position.set(s*0.18,0.08,0.18);shin.rotation.x=-0.15;g.add(shin);
    const foot=new THREE.Mesh(new THREE.SphereGeometry(0.04,5,5),M.shellDk);
    foot.position.set(s*0.18,0.0,0.24);g.add(foot);
  });
  
  g.userData={head,lClawG,rClawG,tailFan,torso,collar};
  return g;
}

// ===== 工位（正常比例，匹配大龙虾）=====
function createDesk(){
  const g=new THREE.Group();
  const top=new THREE.Mesh(new THREE.BoxGeometry(1.8,0.06,0.9),M.deskTop);
  top.position.y=0.9;top.castShadow=true;top.receiveShadow=true;g.add(top);
  const edge=new THREE.Mesh(
    new THREE.BoxGeometry(1.82,0.02,0.92),
    new THREE.MeshStandardMaterial({color:0x7C3AED,emissive:0x7C3AED,emissiveIntensity:0.3})
  );
  edge.position.y=0.88;g.add(edge);
  [[-0.78,-0.35],[0.78,-0.35],[-0.78,0.35],[0.78,0.35]].forEach(([x,z])=>{
    const leg=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,0.87,6),M.silver);
    leg.position.set(x,0.44,z);leg.castShadow=true;g.add(leg);
  });
  // 显示器
  const monBase=new THREE.Mesh(new THREE.CylinderGeometry(0.1,0.12,0.04,8),M.silver);
  monBase.position.set(0,0.94,-0.28);g.add(monBase);
  const monStand=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.3,6),M.silver);
  monStand.position.set(0,1.12,-0.28);g.add(monStand);
  const monFrame=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.55,0.035),M.monitor);
  monFrame.position.set(0,1.45,-0.28);monFrame.castShadow=true;g.add(monFrame);
  const screen=new THREE.Mesh(new THREE.BoxGeometry(0.73,0.47,0.01),M.screen);
  screen.position.set(0,1.45,-0.26);g.add(screen);
  const sGlow=new THREE.PointLight(0x3B82F6,0.3,2);sGlow.position.set(0,1.45,-0.15);g.add(sGlow);
  const kb=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.02,0.14),M.silver);
  kb.position.set(0,0.94,0.15);g.add(kb);
  const mouse=new THREE.Mesh(new THREE.BoxGeometry(0.06,0.02,0.09),M.silver);
  mouse.position.set(0.35,0.94,0.15);g.add(mouse);
  return g;
}

function createChair(bandColor){
  const g=new THREE.Group();
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.65,0.06,0.55),M.chair);
  seat.position.y=0.56;g.add(seat);
  const back=new THREE.Mesh(new THREE.BoxGeometry(0.6,0.65,0.05),M.chair);
  back.position.set(0,0.92,-0.24);back.rotation.x=0.08;g.add(back);
  const band=new THREE.Mesh(new THREE.BoxGeometry(0.55,0.08,0.06),collarMat(bandColor));
  band.position.set(0,0.88,-0.22);g.add(band);
  const post=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.04,0.45,6),M.silver);
  post.position.set(0,0.3,0);g.add(post);
  for(let i=0;i<5;i++){
    const a=i*Math.PI*2/5;
    const arm=new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.015,0.25,4),M.silver);
    arm.position.set(Math.cos(a)*0.15,0.06,Math.sin(a)*0.15);
    arm.rotation.z=Math.PI/2;arm.rotation.y=-a;g.add(arm);
    const wheel=new THREE.Mesh(new THREE.SphereGeometry(0.022,5,5),M.black);
    wheel.position.set(Math.cos(a)*0.26,0.04,Math.sin(a)*0.26);g.add(wheel);
  }
  return g;
}

function createCoffeeArea(){
  const g=new THREE.Group();
  [-0.6,0.6].forEach(x=>{const s=new THREE.Mesh(new THREE.BoxGeometry(0.04,1.8,0.5),M.silver);s.position.set(x,0.9,0);g.add(s);});
  [0.4,1.0,1.6].forEach(y=>{const s=new THREE.Mesh(new THREE.BoxGeometry(1.3,0.04,0.5),M.silver);s.position.y=y;g.add(s);});
  const cm=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.38,0.38),M.black);cm.position.set(0,1.82,0);cm.castShadow=true;g.add(cm);
  const ct=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.06,0.3),M.silver);ct.position.set(0,2.04,0);g.add(ct);
  const btn=new THREE.Mesh(new THREE.SphereGeometry(0.025,6,6),new THREE.MeshStandardMaterial({color:0xEF4444,emissive:0xEF4444,emissiveIntensity:0.6}));
  btn.position.set(0.17,1.78,0.18);g.add(btn);
  for(let row=0;row<2;row++) for(let i=0;i<4;i++){
    const cup=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.035,0.1,8),M.white);
    cup.position.set(-0.3+i*0.2,0.5+row*0.6+0.06,0);g.add(cup);
  }
  return g;
}

function createGym(){
  const g=new THREE.Group();
  const base=new THREE.Mesh(new THREE.BoxGeometry(0.8,0.08,1.4),M.black);base.position.y=0.16;g.add(base);
  const belt=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.03,1.2),M.silver);belt.position.y=0.22;g.add(belt);
  [-0.35,0.35].forEach(x=>{const p=new THREE.Mesh(new THREE.CylinderGeometry(0.02,0.02,0.9,5),M.black);p.position.set(x,0.65,-0.55);g.add(p);});
  const bar=new THREE.Mesh(new THREE.CylinderGeometry(0.018,0.018,0.75,5),M.silver);bar.position.set(0,1.12,-0.55);bar.rotation.z=Math.PI/2;g.add(bar);
  const panel=new THREE.Mesh(new THREE.BoxGeometry(0.24,0.14,0.05),M.black);panel.position.set(0,1.18,-0.58);g.add(panel);
  const ind=new THREE.Mesh(new THREE.SphereGeometry(0.018,5,5),new THREE.MeshStandardMaterial({color:0x10B981,emissive:0x10B981,emissiveIntensity:0.8}));
  ind.position.set(0,1.2,-0.55);g.add(ind);
  return g;
}

function createWC(){
  const g=new THREE.Group();
  [[-0.5,0],[0.5,0]].forEach(([x])=>{const w=new THREE.Mesh(new THREE.BoxGeometry(0.05,1.8,1.0),M.deskTop);w.position.set(x,0.9,0);g.add(w);});
  const bw=new THREE.Mesh(new THREE.BoxGeometry(1.1,1.8,0.05),M.deskTop);bw.position.set(0,0.9,-0.48);g.add(bw);
  const door=new THREE.Mesh(new THREE.BoxGeometry(0.55,1.4,0.03),M.chair);door.position.set(0.15,0.7,0.48);g.add(door);
  const tank=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.28,0.18),M.black);tank.position.set(0,1.0,-0.3);g.add(tank);
  const flBtn=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,0.025,6),M.silver);flBtn.position.set(0,1.16,-0.3);g.add(flBtn);
  const tBase=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.3,0.45),M.black);tBase.position.set(0,0.16,-0.1);g.add(tBase);
  const seat=new THREE.Mesh(new THREE.BoxGeometry(0.34,0.04,0.4),new THREE.MeshStandardMaterial({color:0x2A2A2A,roughness:0.9}));
  seat.position.set(0,0.33,-0.08);g.add(seat);
  const lid=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.03,0.38),new THREE.MeshStandardMaterial({color:0x1A1A1A,roughness:0.8}));
  lid.position.set(0,0.6,-0.06);lid.rotation.x=-0.7;g.add(lid);
  return g;
}

// ===== 粒子 =====
const pCount=120;
const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){pPos[i*3]=(Math.random()-0.5)*24;pPos[i*3+1]=Math.random()*7;pPos[i*3+2]=(Math.random()-0.5)*18;}
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x7C3AED,size:0.04,transparent:true,opacity:0.3}));
scene.add(particles);

// ===== 碰撞障碍物 =====
const obstacles=[];

// ===== 放置场景 =====
const agentData=[
  {id:'pm',  band:0xEF4444,name:'PM'},
  {id:'file',band:0x3B82F6,name:'File'},
  {id:'comp',band:0x10B981,name:'System'},
  {id:'app', band:0xF59E0B,name:'App'},
  {id:'brow',band:0x8B5CF6,name:'Browser'},
  {id:'srch',band:0x06B6D4,name:'Search'},
];

const deskPos=[
  {x:-3.2,z:-2.5},{x:0,z:-2.5},{x:3.2,z:-2.5},
  {x:-3.2,z:2.5},{x:0,z:2.5},{x:3.2,z:2.5}
];

const lobsters=[];
deskPos.forEach((dp,i)=>{
  const ad=agentData[i];
  const desk=createDesk();desk.position.set(dp.x,0,dp.z-0.5);scene.add(desk);
  const chair=createChair(ad.band);chair.position.set(dp.x,0,dp.z+0.4);scene.add(chair);
  
  // 龙虾坐在椅子上：椅座y=0.56，龙虾从脚底开始，脚在y=0，坐姿身体底在0.56
  const lob=createLobster(ad.band);
  // 龙虾坐姿：脚踩地y=0，身体在0.5以上
  // 重新计算：龙虾脚在0.0，身体从0.2到2.2
  // 需要让龙虾的脚踩在地面上，臀部在椅座高度
  // 龙虾结构：脚y=0, 小腿y=0.08, 大腿y=0.42, 躯干底y=0.7, 躯干中心y=1.1, 头中心y=1.82
  // 坐姿：让臀部在椅座y=0.56，即整体y偏移=0.56-0.7=-0.14，但脚要悬空
  // 更简单：直接把龙虾放高，让身体在椅子上，脚自然弯曲
  lob.position.set(dp.x,0.15,dp.z+0.15);  // 整体上移0.15让屁股坐在椅座上
  lob.rotation.y=Math.PI;  // 面朝屏幕
  scene.add(lob);
  
  lobsters.push({
    mesh:lob,desk,chair,
    homeX:dp.x,homeZ:dp.z+0.15,
    homeY:0.15,  // 坐姿Y偏移
    x:dp.x,z:dp.z+0.15,
    state:'sit',band:ad.band,name:ad.name,
    targetX:dp.x,targetZ:dp.z+0.15,
    moving:false,arriveAction:null,
    actionTimer:6000+Math.random()*10000,
    bobPhase:Math.random()*6.28,
    blinkTimer:2000+Math.random()*3000,
    isBlinking:false,
    path:[],pathIdx:0
  });
  
  const dl=new THREE.PointLight(ad.band,0.12,4);dl.position.set(dp.x,2,dp.z);scene.add(dl);
  obstacles.push({x:dp.x,z:dp.z-0.1,hw:1.1,hd:0.7});
  obstacles.push({x:dp.x,z:dp.z+0.4,hw:0.4,hd:0.4});
});

const coffeeArea=createCoffeeArea();coffeeArea.position.set(-6.5,0,-1);scene.add(coffeeArea);
const gymArea=createGym();gymArea.position.set(6.5,0,0);scene.add(gymArea);
const wcArea=createWC();wcArea.position.set(-6.5,0,4);scene.add(wcArea);
obstacles.push({x:-6.5,z:-1,hw:1.0,hd:0.5});
obstacles.push({x:6.5,z:0,hw:0.6,hd:1.0});
obstacles.push({x:-6.5,z:4,hw:0.7,hd:0.7});

const coffeeLight=new THREE.PointLight(0xF59E0B,0.25,5);coffeeLight.position.set(-6.5,2.5,-1);scene.add(coffeeLight);
const gymLight=new THREE.PointLight(0x10B981,0.25,5);gymLight.position.set(6.5,2,0);scene.add(gymLight);

// ===== 碰撞检测 =====
const LOBSTER_R=0.45;

function isBlocked(px,pz){
  for(const o of obstacles){
    if(Math.abs(px-o.x)<o.hw+LOBSTER_R && Math.abs(pz-o.z)<o.hd+LOBSTER_R) return true;
  }
  if(px<-8||px>8||pz<-6||pz>6) return true;
  return false;
}

function findPath(sx,sz,tx,tz){
  let etx=tx,etz=tz;
  if(isBlocked(tx,tz)){
    for(let r=0.5;r<3;r+=0.5){
      for(let a=0;a<6.28;a+=0.5){
        const cx=tx+Math.cos(a)*r,cz=tz+Math.sin(a)*r;
        if(!isBlocked(cx,cz)){etx=cx;etz=cz;r=99;break;}
      }
    }
  }
  const path=[];
  const dx=etx-sx,dz=etz-sz;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.5){path.push({x:etx,z:etz});return path;}
  const steps=Math.ceil(dist/0.5);
  let blocked=false;
  for(let i=1;i<=steps;i++){
    const t=i/steps;
    if(isBlocked(sx+dx*t,sz+dz*t)){blocked=true;break;}
  }
  if(!blocked){path.push({x:etx,z:etz});return path;}
  const midZ=0;
  if(!isBlocked(sx,midZ)){path.push({x:sx,z:midZ});}
  else{for(let off=-3;off<=3;off+=0.5){if(!isBlocked(sx+off,midZ)){path.push({x:sx+off,z:midZ});break;}}}
  if(path.length>0){
    if(!isBlocked(etx,midZ)){path.push({x:etx,z:midZ});}
    else{for(let off=-3;off<=3;off+=0.5){if(!isBlocked(etx+off,midZ)){path.push({x:etx+off,z:midZ});break;}}}
  }
  path.push({x:etx,z:etz});
  return path.filter(p=>!isBlocked(p.x,p.z));
}

// ===== 触摸 =====
let camAngle=0,camDist=12,camH=8;
let tStartX=0,tStartAngle=0,tStartY=0,tStartH=0;
renderer.domElement.addEventListener('touchstart',e=>{
  tStartX=e.touches[0].clientX;tStartY=e.touches[0].clientY;
  tStartAngle=camAngle;tStartH=camH;
},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{
  camAngle=tStartAngle+(e.touches[0].clientX-tStartX)*0.004;
  camH=Math.max(3,Math.min(12,tStartH-(e.touches[0].clientY-tStartY)*0.02));
},{passive:true});

// ===== AI =====
let lastAI=0;
function aiTick(t){
  if(t-lastAI<5000)return;lastAI=t;
  const idle=lobsters.filter(l=>l.state==='sit'&&!l.moving);
  if(!idle.length)return;
  const l=idle[(Math.random()*idle.length)|0];
  const r=Math.random();
  if(r<0.25){l.state='sit';l.actionTimer=8000+Math.random()*12000;}
  else if(r<0.38){startMove(l,-6.5,-1,'coffee');}
  else if(r<0.50){startMove(l,6.5,0,'exercise');}
  else if(r<0.60){startMove(l,-6.5,4,'toilet');}
  else if(r<0.72){l.state='sleep';l.actionTimer=5000+Math.random()*5000;}
  else if(r<0.82){l.state='type';l.actionTimer=4000+Math.random()*6000;}
  else{l.state='sit';l.actionTimer=10000+Math.random()*10000;}
}

function startMove(l,tx,tz,act){
  const path=findPath(l.x,l.z,tx,tz);
  if(path.length===0)return;
  l.path=path;l.pathIdx=0;
  l.targetX=path[0].x;l.targetZ=path[0].z;
  l.moving=true;l.state='walk';l.arriveAction=act;
  l.mesh.position.y=0; // 站起来走路
}

function goHome(l){
  const path=findPath(l.x,l.z,l.homeX,l.homeZ);
  if(path.length===0)return;
  l.path=path;l.pathIdx=0;
  l.targetX=path[0].x;l.targetZ=path[0].z;
  l.moving=true;l.state='walk';l.arriveAction='sit';
  l.actionTimer=8000+Math.random()*10000;
}

// ===== 更新 =====
function update(dt,t){
  lobsters.forEach(l=>{
    const m=l.mesh;
    l.blinkTimer-=dt;
    if(l.blinkTimer<=0){l.isBlinking=!l.isBlinking;l.blinkTimer=l.isBlinking?120:2000+Math.random()*3000;}
    if(l.actionTimer>0&&!l.moving){l.actionTimer-=dt;if(l.actionTimer<=0)goHome(l);}
    
    if(l.state==='sit'){
      m.position.y=l.homeY+Math.sin(t*0.003+l.bobPhase)*0.02;
      m.rotation.y=Math.PI;
      const typeA=Math.sin(t*0.008+l.bobPhase)*0.12;
      m.userData.lClawG.rotation.x=typeA;
      m.userData.rClawG.rotation.x=-typeA;
      m.userData.head.rotation.y=Math.sin(t*0.001)*0.04;
      m.userData.head.children.forEach(c=>{if(c.material===M.eyeW)c.scale.y=l.isBlinking?0.1:1;});
    } else if(l.state==='type'){
      m.position.y=l.homeY+Math.sin(t*0.003+l.bobPhase)*0.02;
      m.rotation.y=Math.PI;
      const typeA=Math.sin(t*0.02)*0.25;
      m.userData.lClawG.rotation.x=typeA;
      m.userData.rClawG.rotation.x=-typeA+Math.sin(t*0.025)*0.1;
      m.userData.head.rotation.y=Math.sin(t*0.003)*0.06;
      m.userData.head.rotation.x=-0.08;
      m.userData.head.children.forEach(c=>{if(c.material===M.eyeW)c.scale.y=l.isBlinking?0.1:1;});
    } else if(l.state==='walk'){
      const dx=l.targetX-l.x,dz=l.targetZ-l.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(dist<0.15){
        l.x=l.targetX;l.z=l.targetZ;
        m.position.x=l.x;m.position.z=l.z;
        l.pathIdx++;
        if(l.pathIdx<l.path.length){
          l.targetX=l.path[l.pathIdx].x;l.targetZ=l.path[l.pathIdx].z;
        } else {
          l.moving=false;
          if(l.arriveAction){
            l.state=l.arriveAction;l.arriveAction=null;
            l.actionTimer=5000+Math.random()*5000;
            if(l.state==='sit'){m.rotation.y=Math.PI;m.position.y=l.homeY;}
          }
        }
        return;
      }
      const spd=0.025;
      const nx=dx/dist*spd,nz=dz/dist*spd;
      const nextX=l.x+nx,nextZ=l.z+nz;
      if(!isBlocked(nextX,nextZ)){l.x=nextX;l.z=nextZ;}
      else{
        if(!isBlocked(l.x+nx,l.z)){l.x+=nx;}
        else if(!isBlocked(l.x,l.z+nz)){l.z+=nz;}
      }
      m.position.x=l.x;m.position.z=l.z;
      m.position.y=Math.sin(t*0.015)*0.04;
      m.rotation.y=Math.atan2(dx,dz);
      m.userData.lClawG.rotation.x=Math.sin(t*0.015)*0.35;
      m.userData.rClawG.rotation.x=-Math.sin(t*0.015)*0.35;
      m.userData.head.rotation.z=Math.sin(t*0.01)*0.05;
      m.userData.head.children.forEach(c=>{if(c.material===M.eyeW)c.scale.y=1;});
    } else if(l.state==='sleep'){
      m.rotation.y=Math.PI;
      m.position.y=l.homeY-0.05+Math.sin(t*0.002)*0.01;
      m.userData.head.rotation.x=0.3;
      m.userData.lClawG.rotation.x=0.4;m.userData.rClawG.rotation.x=0.4;
      m.userData.head.children.forEach(c=>{if(c.material===M.eyeW)c.scale.y=0.1;});
    } else if(l.state==='coffee'){
      m.position.y=0+Math.sin(t*0.004+l.bobPhase)*0.02;
      m.userData.lClawG.rotation.x=-0.3;
      m.userData.rClawG.rotation.x=0.1;
      m.userData.head.rotation.x=Math.sin(t*0.002)*0.04;
      m.userData.head.children.forEach(c=>{if(c.material===M.eyeW)c.scale.y=l.isBlinking?0.1:1;});
    } else if(l.state==='exercise'){
      m.position.y=0+Math.abs(Math.sin(t*0.006))*0.08;
      m.userData.lClawG.rotation.x=Math.sin(t*0.012)*0.5;
      m.userData.rClawG.rotation.x=-Math.sin(t*0.012)*0.5;
      m.userData.head.rotation.y=Math.sin(t*0.008)*0.08;
      m.userData.head.children.forEach(c=>{if(c.material===M.eyeW)c.scale.y=1;});
    } else if(l.state==='toilet'){
      m.visible=false;
    }
    if(l.state!=='toilet')m.visible=true;
  });
  
  const pp=particles.geometry.attributes.position.array;
  for(let i=0;i<pp.length;i+=3){pp[i+1]+=0.002;if(pp[i+1]>7)pp[i+1]=0;}
  particles.geometry.attributes.position.needsUpdate=true;
}

// ===== 主循环 =====
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);
  const dt=lastT?t-lastT:16;lastT=t;
  update(dt,t);aiTick(t);
  camera.position.x=Math.sin(camAngle)*camDist;
  camera.position.z=Math.cos(camAngle)*camDist;
  camera.position.y=camH;
  camera.lookAt(0,1.2,0);
  pLight1.intensity=0.6+Math.sin(t*0.001)*0.15;
  pLight2.intensity=0.4+Math.sin(t*0.0013)*0.1;
  renderer.render(scene,camera);
}
loop(0);
window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
}
