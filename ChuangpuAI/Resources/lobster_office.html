<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<style>
*{margin:0;padding:0}
body{background:#E8E8EC;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),cx=c.getContext('2d');
const W=window.innerWidth,H=460;
c.width=W;c.height=H;

// ========== 工具 ==========
function rr(x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}
function fillRR(x,y,w,h,r,col){cx.fillStyle=col;rr(x,y,w,h,r);cx.fill();}
function strokeRR(x,y,w,h,r,col,lw){cx.strokeStyle=col;cx.lineWidth=lw;rr(x,y,w,h,r);cx.stroke();}
function ell(ex,ey,rx,ry,col){cx.fillStyle=col;cx.beginPath();cx.ellipse(ex,ey,rx,ry,0,0,6.28);cx.fill();}

// ========== 配色（马维斯风）==========
const BG='#E8E8EC'; // 浅灰背景
const DESK='#FFFFFF'; // 白色桌面
const CHAIR='#6B7280'; // 深灰椅子
const MONITOR='#1F2937'; // 黑色显示器
const ACCENT='#3B82F6'; // 蓝色屏幕边框

// ========== Agent定义（6个龙虾）==========
const AG=[
  {id:'pm',  band:'#EF4444',name:'PM'},
  {id:'file',band:'#3B82F6',name:'File'},
  {id:'comp',band:'#10B981',name:'System'},
  {id:'app', band:'#F59E0B',name:'App'},
  {id:'brow',band:'#8B5CF6',name:'Browser'},
  {id:'srch',band:'#06B6D4',name:'Search'},
];

// ========== 布局 ==========
// 3排2列 = 6工位
const ROWS=[
  {y:H*0.28, sc:0.5},  // 后排（小）
  {y:H*0.52, sc:0.65}, // 中排
  {y:H*0.76, sc:0.82}, // 前排（大）
];
const deskPositions=[];
ROWS.forEach((row,ri)=>{
  const cols=2;
  const gap=W*0.32;
  const startX=W*0.22;
  for(let ci=0;ci<cols;ci++){
    deskPositions.push({x:startX+ci*gap, y:row.y, sc:row.sc, row:ri});
  }
});

// 功能区
const coffeeArea={x:W*0.88, y:H*0.25};
const gymArea={x:W*0.88, y:H*0.55};
const wcArea={x:W*0.07, y:H*0.78};

// ========== 创建龙虾 ==========
const L=AG.map((a,i)=>{
  const dp=deskPositions[i];
  return{
    ...a, x:dp.x, y:dp.y, hx:dp.x, hy:dp.y,
    desk:dp, sc:dp.sc, st:'sit', dir:1,
    fr:0, ft:0, tx:dp.x, ty:dp.y, mv:false,
    arrAct:null, actT:6000+Math.random()*10000,
    blkT:1500+Math.random()*2000, blk:false,
    bobT:Math.random()*6.28
  };
});

// ========== 帧动画 ==========
function tickF(l,dt){
  l.ft+=dt;l.bobT+=dt*0.003;
  if(l.ft>=120){l.ft-=120;l.fr=(l.fr+1)%4;}
}

// ========== 背景 ==========
function drawBg(){
  cx.fillStyle=BG;cx.fillRect(0,0,W,H);
  // 微弱纹理
  cx.fillStyle='rgba(0,0,0,0.015)';
  for(let y=0;y<H;y+=3) cx.fillRect(0,y,W,1);
  // 地面线
  cx.fillStyle='rgba(0,0,0,0.04)';cx.fillRect(0,H*0.92,W,1);
  // 区域标签
  cx.textAlign='center';cx.font='bold 9px -apple-system,sans-serif';
  cx.fillStyle='rgba(0,0,0,0.2)';
  cx.fillText('☕ Coffee',coffeeArea.x,coffeeArea.y-50);
  cx.fillText('🏃 Gym',gymArea.x,gymArea.y-42);
  cx.fillText('🚻 WC',wcArea.x,wcArea.y-40);
}

// ========== 侧视工位（马维斯风：白桌+黑显示器+灰椅子）==========
function drawDeskBg(dp,scrLabel,t){
  const dx=dp.x, dy=dp.y, sc=dp.sc;
  cx.save();cx.translate(dx,dy);cx.scale(sc,sc);
  
  // 椅子底座+轮子
  cx.fillStyle='#9CA3AF';
  [-14,0,14].forEach(ox=>{cx.beginPath();cx.arc(ox,35,2.5,0,6.28);cx.fill()});
  // 椅子支柱
  cx.fillStyle='#9CA3AF';cx.fillRect(-2,18,4,18);
  // 椅子坐垫
  fillRR(-18,14,36,6,3,CHAIR);
  // 椅子靠背
  fillRR(-16,-16,14,32,5,CHAIR);
  // 靠背上的彩色条（Agent标识）
  fillRR(-15,-2,12,6,2,AG[deskPositions.indexOf(dp)]?.band||'#EF4444');
  
  // 桌腿
  cx.fillStyle='#E5E7EB';cx.fillRect(-38,12,4,35);cx.fillRect(30,12,4,35);
  cx.fillRect(-38,40,72,2);
  
  // 显示器支架
  cx.fillStyle='#E5E7EB';cx.fillRect(-2,4,4,10);fillRR(-6,10,12,3,1,'#E5E7EB');
  
  // 显示器（朝用户，能看到屏幕）
  fillRR(-22,-36,44,38,4,MONITOR);
  strokeRR(-22,-36,44,38,4,ACCENT,1.2);
  // 屏幕
  fillRR(-19,-33,38,32,2,'#1E3A5F');
  // 屏幕内容
  drawScreenContent(-19,-33,38,32,scrLabel,t);
  
  cx.restore();
}

function drawScreenContent(sx,sy,sw,sh,label,t){
  // 通用蓝色界面
  cx.fillStyle='#1E40AF';cx.fillRect(sx,sy,sw,6);
  cx.fillStyle='rgba(255,255,255,0.7)';cx.font='3px sans-serif';cx.textAlign='left';
  cx.fillText(label,sx+2,sy+4);
  // 内容行
  cx.fillStyle='rgba(255,255,255,0.08)';
  for(let i=0;i<4;i++) cx.fillRect(sx+2,sy+8+i*6,sw-4,4);
  // 活动指示器
  const pulse=Math.sin(t*0.004)*0.3+0.7;
  cx.fillStyle=`rgba(59,130,246,${pulse*0.6})`;
  cx.beginPath();cx.arc(sx+sw-6,sy+sh-6,2,0,6.28);cx.fill();
}

// ========== 桌面前景层 ==========
function drawDeskTop(dp){
  const dx=dp.x, dy=dp.y, sc=dp.sc;
  cx.save();cx.translate(dx,dy);cx.scale(sc,sc);
  // 白色桌面
  fillRR(-42,10,84,10,3,DESK);
  strokeRR(-42,10,84,10,3,'rgba(0,0,0,0.08)',0.8);
  // 键盘
  fillRR(-16,12,28,4,1,'#D1D5DB');
  // 键盘按键
  cx.fillStyle='rgba(0,0,0,0.06)';
  for(let r=0;r<3;r++) for(let c2=0;c2<6;c2++) cx.fillRect(-14+c2*4.5,13+r*1.2,3,0.7);
  // 鼠标
  fillRR(16,12,6,4,2,'#D1D5DB');
  cx.restore();
}

// ========== 咖啡区（银灰咖啡机+杯子柜子，马维斯风）==========
function drawCoffeeArea(t){
  const px=coffeeArea.x, py=coffeeArea.y;
  cx.save();cx.translate(px,py);
  
  // 置物架（浅灰金属架）
  fillRR(-30,-42,60,4,1,'#D1D5DB'); // 上层架板
  fillRR(-30,-8,60,4,1,'#D1D5DB');  // 下层架板
  // 架子侧板
  cx.fillStyle='#E5E7EB';
  cx.fillRect(-30,-46,3,44);
  cx.fillRect(27,-46,3,44);
  
  // 咖啡机（上层，银灰色）
  fillRR(-12,-38,24,18,3,'#9CA3AF');
  strokeRR(-12,-38,24,18,3,'rgba(0,0,0,0.1)',0.5);
  // 咖啡机顶部
  fillRR(-10,-40,20,5,2,'#6B7280');
  // 出水口
  cx.fillStyle='#6B7280';cx.fillRect(-3,-22,6,4);
  // 按钮
  ell(8,-30,2,2,'#EF4444');
  // 杯子在出水口下
  fillRR(-4,-16,8,8,1,'#F9FAFB');
  cx.fillStyle='rgba(139,90,43,0.4)';cx.fillRect(-3,-15,6,3);
  
  // 下层：4个杯子整齐排列
  for(let i=0;i<4;i++){
    const cupX=-22+i*12;
    fillRR(cupX,-5,8,8,1,'#F9FAFB');
    strokeRR(cupX,-5,8,8,1,'rgba(0,0,0,0.06)',0.4);
    // 杯中液体
    cx.fillStyle='rgba(139,90,43,0.3)';cx.fillRect(cupX+1,-4,6,2);
  }
  
  // 蒸汽
  cx.strokeStyle='rgba(255,255,255,0.4)';cx.lineWidth=0.6;
  for(let i=0;i<2;i++){
    cx.beginPath();cx.moveTo(-1+i*3,-20);
    cx.quadraticCurveTo(-1+i*3+Math.sin(t*0.003+i)*2,-28,-1+i*3,-32);cx.stroke();
  }
  
  cx.restore();
}

// ========== 健身区（银灰跑步机）==========
function drawGymArea(t){
  const gx=gymArea.x, gy=gymArea.y;
  cx.save();cx.translate(gx,gy);
  
  // 跑步机主体
  fillRR(-24,-10,48,22,4,'#D1D5DB');
  strokeRR(-24,-10,48,22,4,'rgba(0,0,0,0.08)',0.6);
  // 跑步带
  fillRR(-20,-6,40,14,3,'#9CA3AF');
  // 跑步带移动纹
  cx.strokeStyle='rgba(0,0,0,0.05)';cx.lineWidth=0.5;
  const off=(t*0.01)%10;
  for(let i=-18;i<20;i+=10){const lx=i+off;if(lx>-18&&lx<18){cx.beginPath();cx.moveTo(lx,-4);cx.lineTo(lx,8);cx.stroke()}}
  // 扶手
  cx.strokeStyle='#9CA3AF';cx.lineWidth=3;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-22,-10);cx.lineTo(-22,-28);cx.stroke();
  cx.beginPath();cx.moveTo(22,-10);cx.lineTo(22,-28);cx.stroke();
  // 控制面板
  fillRR(-10,-32,20,6,2,'#E5E7EB');
  // 显示屏
  fillRR(-6,-30,12,3,1,'#1E3A5F');
  // 按钮
  ell(0,-26,1.5,1.5,'#EF4444');
  
  cx.restore();
}

// ========== 卫生间（黑色马桶，逼真）==========
function drawWCArea(){
  const wx=wcArea.x, wy=wcArea.y;
  cx.save();cx.translate(wx,wy);
  
  // 隔间墙
  fillRR(-20,-30,40,56,3,'#E5E7EB');
  strokeRR(-20,-30,40,56,3,'rgba(0,0,0,0.06)',0.6);
  // 门
  fillRR(-18,-28,36,52,2,'#F3F4F6');
  strokeRR(-18,-28,36,52,2,'rgba(0,0,0,0.04)',0.4);
  
  // 马桶水箱 - 黑色
  fillRR(-8,-24,16,10,2,'#374151');
  strokeRR(-8,-24,16,10,2,'rgba(0,0,0,0.1)',0.5);
  // 冲水按钮
  ell(0,-20,3,2,'#6B7280');
  
  // 马桶底座 - 黑色
  fillRR(-12,-6,24,20,6,'#374151');
  strokeRR(-12,-6,24,20,6,'rgba(0,0,0,0.1)',0.5);
  
  // 马桶圈 - 黑色坐垫
  fillRR(-10,-4,20,16,6,'#1F2937');
  strokeRR(-10,-4,20,16,6,'rgba(0,0,0,0.15)',0.5);
  
  // 马桶内圈
  ell(0,4,7,5,'#111827');
  
  // 马桶盖（半开状态）
  cx.fillStyle='#1F2937';
  cx.beginPath();cx.moveTo(-9,-4);cx.quadraticCurveTo(-10,-16,0,-17);
  cx.quadraticCurveTo(10,-16,9,-4);cx.closePath();cx.fill();
  strokeRR(-9,-17,18,14,6,'rgba(0,0,0,0.12)',0.5);
  
  // 门把手
  ell(14,0,2,2,'#9CA3AF');
  
  cx.restore();
}

// ========== 乐高风龙虾（侧视坐着，面朝屏幕/右方）==========
function drawLobsterSit(l,t){
  const sc=l.sc;
  const bob=Math.sin(l.bobT)*1.5;
  
  cx.save();cx.translate(l.x, l.y+bob);cx.scale(sc,sc);
  
  // 投影
  ell(0,28,16,3,'rgba(0,0,0,0.06)');
  
  // 尾巴（后面的小扇形）
  cx.fillStyle='#DC2626';
  cx.beginPath();cx.moveTo(-8,8);cx.quadraticCurveTo(-14,12,-10,20);
  cx.quadraticCurveTo(-6,18,-4,16);cx.quadraticCurveTo(-2,18,0,20);
  cx.quadraticCurveTo(2,18,4,16);cx.quadraticCurveTo(6,18,8,20);
  cx.quadraticCurveTo(6,12,0,8);cx.closePath();cx.fill();
  
  // 后方钳子
  cx.save();cx.translate(-8,-2);cx.rotate(-0.15);
  cx.strokeStyle='#DC2626';cx.lineWidth=3;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(-6,3);cx.lineTo(-10,0);cx.stroke();
  cx.beginPath();cx.moveTo(-6,3);cx.lineTo(-10,6);cx.stroke();
  cx.restore();
  
  // 身体（黑色方块，乐高风）
  fillRR(-12,-6,24,24,5,'#1F2937');
  // 身体高光
  fillRR(-10,-5,8,20,4,'rgba(255,255,255,0.04)');
  
  // 彩色领环/围巾（Agent标识）
  fillRR(-14,0,28,5,2,l.band);
  fillRR(-12,1,24,2,1,'rgba(255,255,255,0.2)');
  
  // 头部（红色圆头，龙虾特征）
  ell(2,-12,12,11,'#DC2626');
  // 头部高光
  ell(0,-15,5,4,'rgba(255,255,255,0.1)');
  
  // 触须
  const wb=Math.sin(t*0.004+l.bobT)*2;
  cx.strokeStyle='#B91C1C';cx.lineWidth=1.5;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-2,-22);cx.quadraticCurveTo(-6+wb,-30,-4+wb,-34);cx.stroke();
  cx.beginPath();cx.moveTo(4,-22);cx.quadraticCurveTo(8-wb,-30,6-wb,-34);cx.stroke();
  
  // 眼睛
  const ey=l.blk?0.15:1;
  cx.save();cx.translate(8,-13);cx.scale(1,ey);
  ell(0,0,4.5,4.5,'#FFFFFF');
  if(!l.blk){
    ell(1.5,0,2.2,2.2,'#1F2937');
    ell(0.8,-1,0.7,0.7,'rgba(255,255,255,0.8)');
  }
  cx.restore();
  
  // 腮红
  ell(10,-8,3,2,'rgba(255,150,150,0.3)');
  
  // 嘴巴
  cx.strokeStyle='#B91C1C';cx.lineWidth=0.8;cx.lineCap='round';
  cx.beginPath();cx.arc(8,-6,2,0.3,2.5);cx.stroke();
  
  // 前方钳子（打字微动）
  const typeAnim=l.st==='sit'?Math.sin(t*0.008)*0.12:0;
  cx.save();cx.translate(12,-2);cx.rotate(0.1+typeAnim);
  cx.strokeStyle='#DC2626';cx.lineWidth=3.5;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(10,2);cx.lineTo(14,-1);cx.stroke();
  cx.beginPath();cx.moveTo(10,2);cx.lineTo(14,5);cx.stroke();
  cx.restore();
  
  cx.restore();
}

// ========== 走路龙虾 ==========
function drawLobsterWalk(l,t){
  const sc=l.sc, d=l.dir, f=l.fr;
  const bob=[0,-2,0,-2][f];
  const legSwing=[[-5,1],[-2,0],[5,-1],[2,0]][f];
  
  cx.save();cx.translate(l.x,l.y+bob);cx.scale(d*sc,sc);
  
  ell(0,26,14,3,'rgba(0,0,0,0.05)');
  
  // 尾巴
  cx.fillStyle='#DC2626';cx.beginPath();
  cx.moveTo(-4,6);cx.quadraticCurveTo(-10,10,-8,18);
  cx.quadraticCurveTo(-4,16,-2,14);cx.quadraticCurveTo(0,16,2,18);
  cx.quadraticCurveTo(4,16,6,14);cx.quadraticCurveTo(8,16,10,18);
  cx.quadraticCurveTo(6,10,2,6);cx.fill();
  
  // 腿
  cx.strokeStyle='#1F2937';cx.lineWidth=2;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-3,12);cx.lineTo(-5+legSwing[0],22);cx.stroke();
  cx.beginPath();cx.moveTo(3,12);cx.lineTo(5+legSwing[1],22);cx.stroke();
  
  // 身体
  fillRR(-12,-6,24,22,5,'#1F2937');
  fillRR(-10,-5,8,18,4,'rgba(255,255,255,0.04)');
  fillRR(-14,0,28,5,2,l.band);
  fillRR(-12,1,24,2,1,'rgba(255,255,255,0.2)');
  
  // 头
  ell(0,-12,11,10,'#DC2626');
  ell(-2,-14,4,3,'rgba(255,255,255,0.08)');
  
  // 触须
  const wb=Math.sin(t*0.005)*2;
  cx.strokeStyle='#B91C1C';cx.lineWidth=1.3;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-3,-21);cx.quadraticCurveTo(-5+wb,-28,-3+wb,-32);cx.stroke();
  cx.beginPath();cx.moveTo(3,-21);cx.quadraticCurveTo(5-wb,-28,3-wb,-32);cx.stroke();
  
  // 眼睛
  const ey=l.blk?0.15:1;
  cx.save();cx.translate(5,-12);cx.scale(1,ey);
  ell(0,0,3.5,3.5,'#FFFFFF');
  if(!l.blk){ell(1,0,1.8,1.8,'#1F2937');ell(0.3,-0.8,0.5,0.5,'rgba(255,255,255,0.7)');}
  cx.restore();
  ell(7,-8,2.5,1.5,'rgba(255,150,150,0.25)');
  
  // 钳子
  const cSwing=Math.sin(t*0.008+f)*0.15;
  cx.save();cx.translate(10,0);cx.rotate(cSwing);
  cx.strokeStyle='#DC2626';cx.lineWidth=3;cx.lineCap='round';cx.lineJoin='round';
  cx.beginPath();cx.moveTo(0,0);cx.lineTo(8,2);cx.lineTo(11,-1);cx.stroke();
  cx.beginPath();cx.moveTo(8,2);cx.lineTo(11,5);cx.stroke();
  cx.restore();
  
  cx.restore();
}

// ========== 特殊状态 ==========
function drawSpecial(l,t){
  const sc=l.sc;
  cx.save();cx.translate(l.x,l.y);cx.scale(sc,sc);
  ell(0,26,14,3,'rgba(0,0,0,0.05)');
  
  if(l.st==='coffee'){
    // 站立正面，拿咖啡
    cx.strokeStyle='#1F2937';cx.lineWidth=2;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-4,12);cx.lineTo(-6,22);cx.stroke();
    cx.beginPath();cx.moveTo(4,12);cx.lineTo(6,22);cx.stroke();
    fillRR(-12,-6,24,22,5,'#1F2937');
    fillRR(-14,0,28,5,2,l.band);
    ell(0,-12,10,10,'#DC2626');
    cx.strokeStyle='#B91C1C';cx.lineWidth=1.3;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-3,-21);cx.quadraticCurveTo(-5,-26,-4,-30);cx.stroke();
    cx.beginPath();cx.moveTo(3,-21);cx.quadraticCurveTo(5,-26,4,-30);cx.stroke();
    // 眼睛
    ell(-4,-12,3,3,'#FFFFFF');ell(4,-12,3,3,'#FFFFFF');
    ell(-3,-12,1.5,1.5,'#1F2937');ell(5,-12,1.5,1.5,'#1F2937');
    ell(-5,-9,2.5,1.5,'rgba(255,150,150,0.25)');ell(5,-9,2.5,1.5,'rgba(255,150,150,0.25)');
    cx.strokeStyle='#B91C1C';cx.lineWidth=0.8;cx.beginPath();cx.arc(0,-8,2,0.3,2.8);cx.stroke();
    // 咖啡杯
    fillRR(10,-4,7,9,1,'#F9FAFB');strokeRR(10,-4,7,9,1,'rgba(0,0,0,0.1)',0.5);
    cx.fillStyle='rgba(139,90,43,0.5)';cx.fillRect(11,-3,5,3);
    cx.strokeStyle='rgba(255,255,255,0.3)';cx.lineWidth=0.5;
    cx.beginPath();cx.moveTo(13.5,-7);cx.quadraticCurveTo(14+Math.sin(t*0.005)*1,-11,13.5,-14);cx.stroke();
    
  } else if(l.st==='exercise'){
    const rf=l.fr%4;const runBob=[0,-1.5,0,-1.5][rf];
    cx.translate(0,runBob);
    cx.strokeStyle='#1F2937';cx.lineWidth=2;cx.lineCap='round';
    const la=rf%2===0;
    cx.beginPath();cx.moveTo(-3,12);cx.lineTo(la?-7:1,22);cx.stroke();
    cx.beginPath();cx.moveTo(3,12);cx.lineTo(la?-1:7,22);cx.stroke();
    fillRR(-12,-6,24,22,5,'#1F2937');
    fillRR(-14,0,28,5,2,l.band);
    ell(0,-12,10,10,'#DC2626');
    cx.strokeStyle='#B91C1C';cx.lineWidth=1.3;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-3,-21);cx.quadraticCurveTo(-4,-26,-3,-30);cx.stroke();
    cx.beginPath();cx.moveTo(3,-21);cx.quadraticCurveTo(4,-26,3,-30);cx.stroke();
    ell(-4,-12,3,3,'#FFFFFF');ell(4,-12,3,3,'#FFFFFF');
    ell(-3,-12,1.5,1.5,'#1F2937');ell(5,-12,1.5,1.5,'#1F2937');
    if(Math.sin(t*0.006)>0) ell(8,-4,1.5,1.5,'rgba(59,130,246,0.4)');
    
  } else if(l.st==='sleep'){
    // 趴桌打盹 - 背面
    fillRR(-12,-6,24,22,5,'#1F2937');
    fillRR(-14,0,28,5,2,l.band);
    ell(0,-12,11,9,'#DC2626');
    cx.strokeStyle='#B91C1C';cx.lineWidth=1.3;cx.lineCap='round';
    cx.beginPath();cx.moveTo(-2,-20);cx.quadraticCurveTo(-4,-26,-3,-30);cx.stroke();
    cx.beginPath();cx.moveTo(2,-20);cx.quadraticCurveTo(4,-26,3,-30);cx.stroke();
    cx.font='8px sans-serif';cx.textAlign='left';cx.fillStyle='rgba(0,0,0,0.25)';
    const zy=-22+Math.sin(t*0.002)*3;
    cx.fillText('z',10,zy);cx.font='6px sans-serif';cx.fillText('z',16,zy-4);
    cx.font='4px sans-serif';cx.fillText('z',20,zy-7);
    
  } else if(l.st==='toilet'){
    // 在卫生间 - 关门
    fillRR(-16,-20,32,40,3,'#E5E7EB');strokeRR(-16,-20,32,40,3,'rgba(0,0,0,0.06)',0.5);
    ell(12,0,2,2,'#9CA3AF');
    // 红色占用标识
    fillRR(-8,-8,16,6,1,'#FEE2E2');cx.fillStyle='#EF4444';cx.font='bold 4px sans-serif';cx.textAlign='center';
    cx.fillText('BUSY',0,-4);
  }
  
  cx.restore();
}

function drawLob(l,t){
  if(l.st==='sit') drawLobsterSit(l,t);
  else if(l.st==='walk') drawLobsterWalk(l,t);
  else drawSpecial(l,t);
}

// ========== AI ==========
let lastAI=0;
function ai(t){
  if(t-lastAI<5000)return;lastAI=t;
  const idle=L.filter(l=>l.st==='sit'&&!l.mv);
  if(!idle.length)return;
  const l=idle[(Math.random()*idle.length)|0];
  const r=Math.random();
  if(r<0.30){l.st='sit';l.actT=8000+Math.random()*12000}
  else if(r<0.42){mvTo(l,coffeeArea,'coffee')}
  else if(r<0.54){mvTo(l,gymArea,'exercise')}
  else if(r<0.64){mvTo(l,wcArea,'toilet')}
  else if(r<0.74){l.st='sleep';l.actT=5000+Math.random()*5000}
  else if(r<0.84){l.st='sit';l.actT=6000+Math.random()*8000}
  else{l.st='sit';l.actT=10000+Math.random()*10000}
}
function mvTo(l,z,act){
  l.tx=z.x;l.ty=z.y-5*l.sc;l.mv=true;l.st='walk';
  l.dir=l.tx>l.x?1:-1;l.arrAct=act;
}
function goHome(l){
  l.tx=l.hx;l.ty=l.hy;l.mv=true;l.st='walk';
  l.dir=l.tx>l.x?1:-1;l.arrAct='sit';l.actT=8000+Math.random()*10000;
}

// ========== 更新 ==========
function update(dt,t){
  L.forEach(l=>{
    tickF(l,dt);
    l.blkT-=dt;if(l.blkT<=0){l.blk=!l.blk;l.blkT=l.blk?80:2000+Math.random()*3000}
    if(l.actT>0&&!l.mv){l.actT-=dt;if(l.actT<=0)goHome(l)}
    if(!l.mv)return;
    const dx=l.tx-l.x,dy=l.ty-l.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<3){l.x=l.tx;l.y=l.ty;l.mv=false;
      if(l.arrAct){l.st=l.arrAct;l.arrAct=null;l.actT=5000+Math.random()*5000;l.fr=0}
      return;
    }
    const spd=0.8*l.sc;
    l.x+=dx/d*spd;l.y+=dy/d*spd;
    if(Math.abs(dx)>1)l.dir=dx>0?1:-1;
  });
}

// ========== 主循环 ==========
let lt=0;
function loop(t){
  const dt=lt?t-lt:16;lt=t;
  update(dt,t);ai(t);
  
  drawBg();
  
  // 功能区（先画，在背景层）
  drawCoffeeArea(t);
  drawGymArea(t);
  drawWCArea();
  
  // 工位背景层（椅子+显示器）
  deskPositions.forEach((dp,i)=>drawDeskBg(dp,AG[i].name,t));
  
  // 龙虾（按Y排序，远到近）
  [...L].sort((a,b)=>a.y-b.y).forEach(l=>drawLob(l,t));
  
  // 桌面前景层
  L.forEach(l=>{
    if(l.st==='sit'||l.st==='sleep') drawDeskTop(l.desk);
  });
  
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
