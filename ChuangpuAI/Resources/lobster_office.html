// ============ 3D LOBSTER MODEL ============
function createLobster3D(agentColor){
  const g=new THREE.Group();
  const shellMat=new THREE.MeshStandardMaterial({color:0xcc3311,roughness:0.5,metalness:0.2});
  const bellyMat=new THREE.MeshStandardMaterial({color:0xee7744,roughness:0.6,metalness:0.1});
  const eyeMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0x222222,emissiveIntensity:0.3});
  const pupilMat=new THREE.MeshStandardMaterial({color:0x111111});
  const bandMat=new THREE.MeshStandardMaterial({color:agentColor,roughness:0.4,metalness:0.3,emissive:agentColor,emissiveIntensity:0.2});

  // Body - main thorax (ellipsoid using scale)
  const thorax=new THREE.Mesh(new THREE.SphereGeometry(0.35,16,12),shellMat);
  thorax.scale.set(1,1.1,1.3);
  thorax.position.set(0,1.5,0);
  thorax.castShadow=true;
  g.add(thorax);

  // Abdomen segments
  for(let i=0;i<5;i++){
    const seg=new THREE.Mesh(new THREE.SphereGeometry(0.28-i*0.03,12,8),shellMat);
    seg.scale.set(1,0.9,1);
    seg.position.set(0,1.3-i*0.25,-0.35-i*0.22);
    seg.castShadow=true;
    g.add(seg);
  }

  // Tail fan
  const tailFan=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,4),shellMat);
  tailFan.scale.set(1.2,0.15,0.8);
  tailFan.position.set(0,0.95,-1.6);
  tailFan.castShadow=true;
  g.add(tailFan);
  // Tail fan side fins
  [-1,1].forEach(s=>{
    const fin=new THREE.Mesh(new THREE.SphereGeometry(0.15,6,4),shellMat);
    fin.scale.set(0.8,0.12,1.2);
    fin.position.set(s*0.3,0.95,-1.55);
    fin.rotation.y=s*0.3;
    g.add(fin);
  });

  // Head
  const head=new THREE.Mesh(new THREE.SphereGeometry(0.3,14,10),shellMat);
  head.scale.set(1,1,1.1);
  head.position.set(0,1.8,0.3);
  head.castShadow=true;
  g.add(head);

  // Rostrum (pointed forehead spike)
  const rostrumGeo=new THREE.ConeGeometry(0.06,0.35,6);
  const rostrum=new THREE.Mesh(rostrumGeo,shellMat);
  rostrum.position.set(0,2.0,0.55);
  rostrum.rotation.x=Math.PI*0.2;
  g.add(rostrum);

  // Eye stalks + eyes
  [-1,1].forEach(s=>{
    // Eye stalk
    const stalk=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.04,0.25,8),shellMat);
    stalk.position.set(s*0.18,2.1,0.35);
    stalk.rotation.z=s*0.25;
    stalk.rotation.x=-0.2;
    g.add(stalk);
    // Eye ball
    const eye=new THREE.Mesh(new THREE.SphereGeometry(0.08,10,10),eyeMat);
    eye.position.set(s*0.22,2.28,0.38);
    g.add(eye);
    // Pupil
    const pupil=new THREE.Mesh(new THREE.SphereGeometry(0.04,8,8),pupilMat);
    pupil.position.set(s*0.24,2.28,0.44);
    g.add(pupil);
  });

  // Antennae - long curved
  [-1,1].forEach(s=>{
    const curve=new THREE.CatmullRomCurve3([
      new THREE.Vector3(s*0.12,2.05,0.4),
      new THREE.Vector3(s*0.2,2.3,0.7),
      new THREE.Vector3(s*0.3,2.5,1.2),
      new THREE.Vector3(s*0.25,2.6,1.8),
      new THREE.Vector3(s*0.15,2.55,2.3)
    ]);
    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,20,0.02,6,false),shellMat);
    g.add(tube);
  });

  // Small antennules
  [-1,1].forEach(s=>{
    const curve=new THREE.CatmullRomCurve3([
      new THREE.Vector3(s*0.08,2.0,0.45),
      new THREE.Vector3(s*0.15,2.15,0.8),
      new THREE.Vector3(s*0.12,2.2,1.1)
    ]);
    const tube=new THREE.Mesh(new THREE.TubeGeometry(curve,12,0.015,4,false),shellMat);
    g.add(tube);
  });

  // Claws
  [-1,1].forEach(s=>{
    // Arm
    const armCurve=new THREE.CatmullRomCurve3([
      new THREE.Vector3(s*0.35,1.5,0),
      new THREE.Vector3(s*0.65,1.4,0.1),
      new THREE.Vector3(s*0.85,1.2,0.15)
    ]);
    const arm=new THREE.Mesh(new THREE.TubeGeometry(armCurve,10,0.06,6,false),shellMat);
    arm.castShadow=true;
    g.add(arm);

    // Big claw (chela)
    const clawGroup=new THREE.Group();
    clawGroup.position.set(s*0.85,1.2,0.15);
    clawGroup.rotation.z=s*0.3;
    
    // Claw palm
    const palm=new THREE.Mesh(new THREE.SphereGeometry(0.18,10,8),shellMat);
    palm.scale.set(1.2,0.7,1);
    palm.castShadow=true;
    clawGroup.add(palm);

    // Upper finger
    const upperFinger=new THREE.Mesh(new THREE.BoxGeometry(0.08,0.05,0.25),shellMat);
    upperFinger.position.set(0,0.08,0.18);
    upperFinger.rotation.x=0.15;
    clawGroup.add(upperFinger);
    // Serration bumps on upper
    for(let i=0;i<3;i++){
      const bump=new THREE.Mesh(new THREE.SphereGeometry(0.02,4,4),shellMat);
      bump.position.set(0,0.05,0.1+i*0.07);
      clawGroup.add(bump);
    }

    // Lower finger
    const lowerFinger=new THREE.Mesh(new THREE.BoxGeometry(0.07,0.05,0.22),shellMat);
    lowerFinger.position.set(0,-0.08,0.16);
    lowerFinger.rotation.x=-0.15;
    clawGroup.add(lowerFinger);
    for(let i=0;i<3;i++){
      const bump=new THREE.Mesh(new THREE.SphereGeometry(0.018,4,4),shellMat);
      bump.position.set(0,-0.05,0.08+i*0.07);
      clawGroup.add(bump);
    }

    g.add(clawGroup);
  });

  // Walking legs (4 pairs)
  for(let i=0;i<4;i++){
    [-1,1].forEach(s=>{
      const zOff=-0.1+i*0.15;
      const legCurve=new THREE.CatmullRomCurve3([
        new THREE.Vector3(s*0.3,1.3,zOff),
        new THREE.Vector3(s*0.55,0.9,zOff+s*0.05),
        new THREE.Vector3(s*0.6,0.5,zOff+s*0.08),
        new THREE.Vector3(s*0.55,0.05,zOff+s*0.06)
      ]);
      const leg=new THREE.Mesh(new THREE.TubeGeometry(legCurve,8,0.025,4,false),shellMat);
      leg.castShadow=true;
      g.add(leg);
    });
  }

  // Blue overalls / band color vest
  const vest=new THREE.Mesh(new THREE.SphereGeometry(0.36,14,10),bandMat);
  vest.scale.set(0.95,0.7,1.15);
  vest.position.set(0,1.35,0);
  g.add(vest);

  // Belt
  const beltGeo=new THREE.TorusGeometry(0.35,0.04,8,16);
  const belt=new THREE.Mesh(beltGeo,bandMat);
  belt.position.set(0,1.15,0);
  belt.rotation.x=Math.PI/2;
  g.add(belt);

  // Name tag glow
  const nameTag=new THREE.Mesh(new THREE.PlaneGeometry(0.2,0.08),new THREE.MeshStandardMaterial({color:agentColor,emissive:agentColor,emissiveIntensity:0.8}));
  nameTag.position.set(0,1.5,0.37);
  g.add(nameTag);

  return g;
}

// Collision obstacles
const obstacles=[];
desks.forEach(d=>{
  obstacles.push({x:d.x,z:d.z,w:2.8,d:1.6});
});
obstacles.push({x:-7,z:-1,w:1,d:1}); // coffee
obstacles.push({x:7,z:0,w:1,d:2.2}); // treadmill
obstacles.push({x:-7,z:4,w:1.5,d:2}); // bathroom

function checkCollision(x,z,r){
  for(const o of obstacles){
    if(x+r>o.x-o.w/2 && x-r<o.x+o.w/2 && z+r>o.z-o.d/2 && z-r<o.z+o.d/2) return true;
  }
  return false;
}

function moveAvoiding(obs,x1,z1,x2,z2){
  const dx=x2-x1, dz=z2-z1;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.05) return {x:x2,z:z2};
  const step=0.08;
  let nx=x1+dx/dist*step, nz=z1+dz/dist*step;
  if(!checkCollision(nx,nz,0.4)) return {x:nx,z:nz};
  // Try sideways
  const perpX=-dz/dist*step, perpZ=dx/dist*step;
  nx=x1+perpX; nz=z1+perpZ;
  if(!checkCollision(nx,nz,0.4)) return {x:nx,z:nz};
  nx=x1-perpX; nz=z1-perpZ;
  if(!checkCollision(nx,nz,0.4)) return {x:nx,z:nz};
  return {x:x1,z:z1};
}

// Create agents
let gltfModel=null;
const agentMeshes=[];

AGENTS.forEach((a,i)=>{
  const desk=desks[a.deskIdx];
  const mesh=createLobster3D(a.color);
  mesh.position.set(desk.x,0,desk.z+1.2);
  mesh.userData={agentIdx:i,baseScale:1};
  scene.add(mesh);
  agentMeshes.push(mesh);
});

// Try loading GLB model
const loader=new THREE.GLTFLoader();
loader.load('lobster.glb',
  (gltf)=>{
    gltfModel=gltf.scene;
    console.log('GLB model loaded!');
    // Replace all agent meshes with GLB model
    agentMeshes.forEach((mesh,i)=>{
      const newModel=gltfModel.clone();
      newModel.traverse(c=>{
        if(c.isMesh){
          c.castShadow=true;
          c.receiveShadow=true;
        }
      });
      // Scale to roughly same size as procedural model
      const box=new THREE.Box3().setFromObject(newModel);
      const size=box.getSize(new THREE.Vector3());
      const maxDim=Math.max(size.x,size.y,size.z);
      const targetHeight=2.2;
      const scale=targetHeight/maxDim;
      newModel.scale.setScalar(scale);
      // Recenter
      newModel.position.set(0,0,0);
      // Copy position and rotation from old mesh
      newModel.position.copy(mesh.position);
      // Add band color - recolor
      const bandColor=new THREE.Color(AGENTS[i].color);
      newModel.traverse(c=>{
        if(c.isMesh && c.material){
          // Add emissive glow for band color
          const m=c.material.clone();
          m.emissive=bandColor;
          m.emissiveIntensity=0.15;
          c.material=m;
        }
      });
      scene.remove(mesh);
      newModel.userData={agentIdx:i};
      agentMeshes[i]=newModel;
      scene.add(newModel);
    });
  },
  undefined,
  (err)=>{console.log('No GLB model found, using procedural lobster');}
);

// Sitting pose - legs tucked, body lower
function setSittingPose(mesh){
  mesh.position.y=0;
  mesh.scale.y=0.85;
}

// Walking animation
function animateWalk(mesh,time,speed){
  const bob=Math.sin(time*speed*8)*0.05;
  mesh.position.y=bob;
  mesh.scale.y=1+Math.sin(time*speed*8)*0.03;
  // Leg sway
  const legSway=Math.sin(time*speed*8)*0.1;
  mesh.rotation.z=legSway*0.05;
}

};

function getRandomDuration(state){
  const [min,max]=STATE_DURATIONS[state]||[5,10];
  return min+Math.random()*(max-min);
}

function pickNextState(agent){
  const r=Math.random();
  if(r<0.35) return 'sitting';
  if(r<0.55) return 'coffee';
  if(r<0.7) return 'exercise';
  if(r<0.85) return 'bathroom';
  return 'walking';
}

function getTargetPos(agent,state){
  const desk=desks[agent.deskIdx];
  if(state==='sitting') return {x:desk.x,z:desk.z+1.2};
  if(state==='coffee') return POI.coffee;
  if(state==='exercise') return POI.exercise;
  if(state==='bathroom') return POI.bathroom;
  // Walking - random nearby point
  return {x:(Math.random()-0.5)*8,z:(Math.random()-0.5)*6};
}

// Init agent states
AGENTS.forEach(a=>{
  a.timer=getRandomDuration('sitting');
  a.state='sitting';
  a.progress=1;
  a.startPos={x:desks[a.deskIdx].x,z:desks[a.deskIdx].z+1.2};
  a.targetPos={x:desks[a.deskIdx].x,z:desks[a.deskIdx].z+1.2};
  a.facing=0;
});

// Particle system for ambiance
const particleCount=200;
const particleGeo=new THREE.BufferGeometry();
const particlePos=new Float32Array(particleCount*3);
for(let i=0;i<particleCount;i++){
  particlePos[i*3]=(Math.random()-0.5)*20;
  particlePos[i*3+1]=Math.random()*6;
  particlePos[i*3+2]=(Math.random()-0.5)*20;
}
particleGeo.setAttribute('position',new THREE.BufferAttribute(particlePos,3));
const particleMat=new THREE.PointsMaterial({color:0x7C3AED,size:0.04,transparent:true,opacity:0.4});
const particles=new THREE.Points(particleGeo,particleMat);
scene.add(particles);

// Camera control
let camAngle=0;
let camDist=22;
let camHeight=14;
let autoRotate=true;
let dragStart=null;

renderer.domElement.addEventListener('pointerdown',e=>{
  dragStart={x:e.clientX,y:e.clientY};
  autoRotate=false;
});
renderer.domElement.addEventListener('pointermove',e=>{
  if(!dragStart) return;
  const dx=e.clientX-dragStart.x;
  camAngle+=dx*0.005;
  dragStart={x:e.clientX,y:e.clientY};
});
renderer.domElement.addEventListener('pointerup',()=>{
  dragStart=null;
  setTimeout(()=>autoRotate=true,5000);
});
renderer.domElement.addEventListener('wheel',e=>{
  camDist=Math.max(10,Math.min(35,camDist+e.deltaY*0.02));
});

// HUD
const hud=document.getElementById('hud');
function updateHUD(){
  let txt='';
  AGENTS.forEach(a=>{
    const icon={sitting:'💻',walking:'🚶',coffee:'☕',exercise:'🏋️',bathroom:'🚽',sleeping:'😴'}[a.state]||'❓';
    txt+=`${icon} ${a.name}: ${a.state}\n`;
  });
  hud.textContent=txt;
}

// Animation loop
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  const time=clock.getElapsedTime();

  // Update agents
  AGENTS.forEach((a,i)=>{
    const mesh=agentMeshes[i];
    if(!mesh) return;

    a.timer-=dt;
    if(a.timer<=0){
      const newState=pickNextState(a);
      a.state=newState;
      a.startPos={x:mesh.position.x,z:mesh.position.z};
      a.targetPos=getTargetPos(a,newState);
      a.progress=0;
      a.timer=getRandomDuration(newState);
      if(newState==='sleeping'){
        // Sleep at desk
        a.targetPos={x:desks[a.deskIdx].x,z:desks[a.deskIdx].z+1.2};
      }
    }

    // Move towards target
    const dx=a.targetPos.x-mesh.position.x;
    const dz=a.targetPos.z-mesh.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);

    if(dist>0.3){
      // Walking
      const newPos=moveAvoiding(obstacles,mesh.position.x,mesh.position.z,a.targetPos.x,a.targetPos.z);
      mesh.position.x=newPos.x;
      mesh.position.z=newPos.z;
      // Face direction
      const targetAngle=Math.atan2(dx,dz);
      let angleDiff=targetAngle-a.facing;
      while(angleDiff>Math.PI) angleDiff-=Math.PI*2;
      while(angleDiff<-Math.PI) angleDiff+=Math.PI*2;
      a.facing+=angleDiff*0.1;
      mesh.rotation.y=a.facing;
      animateWalk(mesh,time,1);
      if(a.state==='sitting') a.state='walking';
    } else {
      // At destination
      if(a.state==='sitting'||a.state==='sleeping'){
        const desk=desks[a.deskIdx];
        // Face desk (away from camera)
        const faceAngle=Math.atan2(desk.x-mesh.position.x,desk.z-mesh.position.z-0.5);
        let ad=faceAngle-a.facing;
        while(ad>Math.PI) ad-=Math.PI*2;
        while(ad<-Math.PI) ad+=Math.PI*2;
        a.facing+=ad*0.1;
        mesh.rotation.y=a.facing;
        setSittingPose(mesh);
        if(a.state==='sleeping'){
          // Gentle breathing
          mesh.scale.y=0.85+Math.sin(time*2)*0.02;
          mesh.rotation.z=Math.sin(time*1.5)*0.03;
        }
      } else {
        // At activity station - idle animation
        mesh.position.y=Math.sin(time*3)*0.03;
        // Slow rotation to look around
        mesh.rotation.y+=Math.sin(time*0.5+i)*0.005;
      }
    }
  });

  // Camera
  if(autoRotate) camAngle+=dt*0.1;
  camera.position.x=Math.sin(camAngle)*camDist;
  camera.position.y=camHeight;
  camera.position.z=Math.cos(camAngle)*camDist;
  camera.lookAt(0,1,0);

  // Animate particles
  const positions=particles.geometry.attributes.position.array;
  for(let i=0;i<particleCount;i++){
    positions[i*3+1]+=dt*0.2;
    if(positions[i*3+1]>6){
      positions[i*3+1]=0;
      positions[i*3]=(Math.random()-0.5)*20;
      positions[i*3+2]=(Math.random()-0.5)*20;
    }
  }
  particles.geometry.attributes.position.needsUpdate=true;

  // Animate lights
  purpleLight.intensity=1.5+Math.sin(time*2)*0.3;
  blueLight.intensity=1.2+Math.sin(time*1.5+1)*0.3;

  updateHUD();
  renderer.render(scene,camera);
}

// Resize
window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});

// Start
document.getElementById('ld').style.display='none';
animate();

// Post message to native
function postMsg(msg){
  if(window.webkit&&window.webkit.messageHandlers&&window.webkit.messageHandlers.native){
    window.webkit.messageHandlers.native.postMessage(msg);
  }
}
postMsg('office_ready');
</script>
</body>
</html>
