<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0}
body{background:#0D0D1A;overflow:hidden;touch-action:none}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),x=c.getContext('2d');
const W=window.innerWidth,H=340;
c.width=W;c.height=H;
const BG='#0D0D1A',NEON='#7C3AED',NEON2='#3B82F6';

const agents=[
  {id:'pm',name:'主管',color:'#EF4444',dk:'#B91C1C'},
  {id:'file',name:'文件员',color:'#3B82F6',dk:'#1D4ED8'},
  {id:'computer',name:'系统员',color:'#10B981',dk:'#047857'},
  {id:'app',name:'应用员',color:'#F97316',dk:'#C2410C'},
  {id:'browser',name:'浏览器员',color:'#8B5CF6',dk:'#6D28D9'},
  {id:'search',name:'搜索员',color:'#06B6D4',dk:'#0E7490'},
];

const backDesks=[{x:W*.22,y:H*.65},{x:W*.46,y:H*.65},{x:W*.68,y:H*.65}];
const frontDesks=[{x:W*.25,y:H*.32},{x:W*.50,y:H*.32},{x:W*.72,y:H*.32}];
const coffeeZone={x:W*.88,y:H*.55};
const gymZone={x:W*.88,y:H*.22};
const toiletZone={x:W*.10,y:H*.78};

const L=agents.map((a,i)=>{
  const back=i<3,di=back?i:i-3;
  const home=back?backDesks[di]:frontDesks[di];
  return{...a,x:home.x,y:home.y,hx:home.x,hy:home.y,
    back:back,sc:back?0.55:0.8,st:'sit_work',
    tx:home.x,ty:home.y,mv:false,fr:true,
    bp:Math.random()*6.28,cp:Math.random()*6.28,
    bt:Math.random()*200,bk:false,
    screenContent:['code','files','chat','game','browser','stats'][i],
    sitOffset:0,arriveAction:null,actionTimer:0};
});

// 绘制圆角矩形
function rr(x1,y1,w,h,r){
  x.beginPath();x.moveTo(x1+r,y1);x.lineTo(x1+w-r,y1);
  x.quadraticCurveTo(x1+w,y1,x1+w,y1+r);x.lineTo(x1+w,y1+h-r);
  x.quadraticCurveTo(x1+w,y1+h,x1+w-r,y1+h);x.lineTo(x1+r,y1+h);
  x.quadraticCurveTo(x1,y1+h,x1,y1+h-r);x.lineTo(x1,y1+r);
  x.quadraticCurveTo(x1,y1,x1+r,y1);x.closePath();
}

function drawBg(t){
  x.fillStyle=BG;x.fillRect(0,0,W,H);
  // 地板
  x.strokeStyle='rgba(124,58,237,0.06)';x.lineWidth=0.5;
  for(let i=0;i<W;i+=28){x.beginPath();x.moveTo(i,0);x.lineTo(i,H);x.stroke()}
  for(let i=0;i<H;i+=28){x.beginPath();x.moveTo(0,i);x.lineTo(W,i);x.stroke()}
  // 区域标签
  x.fillStyle='rgba(124,58,237,0.3)';x.font='9px sans-serif';x.textAlign='center';
  x.fillText('☕ 咖啡',coffeeZone.x,coffeeZone.y-30);
  x.fillText('🏃 健身',gymZone.x,gymZone.y-22);
  x.fillText('🚻 卫生间',toiletZone.x,toiletZone.y-30);
}

// 画工位（背景层：椅背、桌腿）
function deskBg(dx,dy,s){
  x.save();x.translate(dx,dy);x.scale(s,s);
  // 椅子靠背（在角色后面）
  x.fillStyle='#16162e';x.strokeStyle='rgba(124,58,237,0.25)';x.lineWidth=0.6;
  rr(-14,8,28,18,5);x.fill();x.stroke();
  // 椅子轮子
  x.fillStyle='#111';[-10,0,10].forEach(ox=>{x.beginPath();x.arc(ox,28,2,0,6.28);x.fill()});
  // 桌腿
  x.fillStyle='#1a1a2e';
  x.fillRect(-42,-8,4,28);x.fillRect(38,-8,4,28);
  x.restore();
}

// 画工位（前景层：桌面+显示器，遮挡角色下半身）
function deskFg(dx,dy,s,screenType,t){
  x.save();x.translate(dx,dy);x.scale(s,s);
  // 桌面
  x.fillStyle='#1a1a36';x.strokeStyle=NEON;x.lineWidth=0.7;
  rr(-44,-10,88,8,3);x.fill();x.stroke();
  // 键盘
  x.fillStyle='#222244';rr(-18,-6,36,3,1);x.fill();
  // 鼠标
  x.fillStyle='#222244';rr(22,-5,6,3,1);x.fill();
  // 显示器
  x.fillStyle='#0a0a1a';x.strokeStyle=NEON;x.lineWidth=0.6;
  rr(-16,-32,32,22,2);x.fill();x.stroke();
  // 屏幕内容
  drawScreen(-14,-30,28,18,screenType,t);
  // 显示器支架
  x.fillStyle='#1a1a2e';x.fillRect(-2,-10,4,3);
  x.restore();
}

// 屏幕内容
function drawScreen(sx,sy,sw,sh,type,t){
  x.save();x.beginPath();rr(sx,sy,sw,sh,1);x.clip();
  switch(type){
    case 'code':
      x.fillStyle='#0d1117';x.fillRect(sx,sy,sw,sh);
      x.fillStyle='rgba(0,255,100,0.6)';x.font='3px monospace';
      for(let i=0;i<5;i++){
        const code='const data = await fetch(url)';
        x.fillText(code.substring(0,8+Math.sin(t*0.001+i)*3),sx+1,sy+3+i*3);
      }
      // 光标闪烁
      if(Math.sin(t*0.005)>0){x.fillStyle='#0f0';x.fillRect(sx+20,sy+9,2,2)}
      break;
    case 'files':
      x.fillStyle='#1a1a2e';x.fillRect(sx,sy,sw,sh);
      x.fillStyle='rgba(59,130,246,0.7)';x.font='3px sans-serif';
      ['📄 报告.pdf','📊 数据.xlsx','📝 合同.docx','📁 项目'].forEach((f,i)=>x.fillText(f,sx+1,sy+4+i*4));
      break;
    case 'chat':
      x.fillStyle='#1e1e2e';x.fillRect(sx,sy,sw,sh);
      x.fillStyle='rgba(124,58,237,0.5)';rr(sx+1,sy+1,14,3,1);x.fill();
      x.fillStyle='rgba(59,130,246,0.5)';rr(sx+3,sy+6,12,3,1);x.fill();
      x.fillStyle='rgba(124,58,237,0.5)';rr(sx+1,sy+10,14,3,1);x.fill();
      break;
    case 'game':
      x.fillStyle='#0a0a2e';x.fillRect(sx,sy,sw,sh);
      // 简单游戏画面
      x.fillStyle='rgba(16,185,129,0.8)';x.beginPath();x.arc(sx+8+Math.sin(t*0.003)*4,sy+9,3,0,6.28);x.fill();
      x.fillStyle='rgba(239,68,68,0.6)';
      for(let i=0;i<3;i++){x.fillRect(sx+18+Math.sin(t*0.002+i)*3,sy+3+i*5,2,2)}
      x.fillStyle='#fff';x.font='3px sans-serif';x.fillText('SCORE:99',sx+1,sy+3);
      break;
    case 'browser':
      x.fillStyle='#1a1a2e';x.fillRect(sx,sy,sw,sh);
      x.fillStyle='#333';x.fillRect(sx,sy,sw,3);
      x.fillStyle='#666';x.font='2px sans-serif';x.fillText('🔍 search...',sx+2,sy+2);
      x.fillStyle='rgba(255,255,255,0.3)';
      for(let i=0;i<3;i++){x.fillRect(sx+1,sy+5+i*4,sw-2,2)}
      break;
    case 'stats':
      x.fillStyle='#0d0d1a';x.fillRect(sx,sy,sw,sh);
      x.strokeStyle='rgba(6,182,212,0.7)';x.lineWidth=1;x.beginPath();
      for(let i=0;i<7;i++){const px=sx+2+i*4,py=sy+14-Math.sin(t*0.002+i)*5;x.lineTo(px,py)}
      x.stroke();
      break;
  }
  x.restore();
}

function coffeeMachine(cx,cy){
  x.save();x.translate(cx,cy);
  x.fillStyle='#1E1E3A';x.strokeStyle=NEON;x.lineWidth=0.7;
  rr(-20,-25,40,38,3);x.fill();x.stroke();
  x.fillStyle='#111128';x.fillRect(-8,-5,16,10);
  x.fillStyle='#2a2a4a';x.fillRect(-6,7,12,8);
  x.fillStyle='rgba(124,58,237,0.15)';x.beginPath();x.arc(0,-30,8,0,6.28);x.fill();
  x.restore();
}

function treadmill(tx,ty){
  x.save();x.translate(tx,ty);
  x.fillStyle='#1E1E3A';x.strokeStyle=NEON;x.lineWidth=0.7;
  rr(-24,-12,48,24,4);x.fill();x.stroke();
  x.strokeStyle='rgba(124,58,237,0.15)';x.lineWidth=0.4;
  for(let i=-20;i<22;i+=5){x.beginPath();x.moveTo(i,-10);x.lineTo(i,10);x.stroke()}
  x.strokeStyle=NEON;x.lineWidth=1.5;
  x.beginPath();x.moveTo(-22,-12);x.lineTo(-22,-28);x.stroke();
  x.beginPath();x.moveTo(22,-12);x.lineTo(22,-28);x.stroke();
  x.fillStyle='rgba(59,130,246,0.3)';x.fillRect(-10,-28,20,8);
  x.restore();
}

function toiletArea(tx,ty){
  x.save();x.translate(tx,ty);
  x.fillStyle='#12122a';x.strokeStyle='rgba(124,58,237,0.25)';x.lineWidth=0.6;
  rr(-22,-28,44,50,3);x.fill();x.stroke();
  x.fillStyle='#ddd';x.beginPath();x.ellipse(0,5,11,13,0,0,6.28);x.fill();
  x.fillStyle='#eee';x.beginPath();x.ellipse(0,3,8,9,0,0,6.28);x.fill();
  x.fillStyle='#ccc';x.beginPath();x.ellipse(0,-3,9,4,0,3.14,0);x.fill();
  x.fillStyle='#e8e8e8';x.beginPath();x.arc(18,-10,4,0,6.28);x.fill();
  x.restore();
}

// 画龙虾角色
function drawLobster(l,t){
  const s=l.sc;
  const isSit=l.st==='sit_work'||l.st==='sit_idle'||l.st==='sleep';
  const bob=l.st==='walk'?Math.sin(l.bp)*4*s:0;
  const br=l.st==='sit_idle'?Math.sin(t*0.002+l.bp)*1:0;

  x.save();x.translate(l.x,l.y+bob+br);
  x.scale(l.fr?s:-s,s);

  // 尾巴
  x.fillStyle=l.dk;x.beginPath();
  x.moveTo(0,10);x.quadraticCurveTo(-6,18,-4,22);
  x.quadraticCurveTo(0,20,4,22);x.quadraticCurveTo(6,18,0,10);x.fill();

  // 身体
  x.fillStyle=l.color;x.beginPath();x.ellipse(0,3,13,10,0,0,6.28);x.fill();
  x.fillStyle='rgba(255,255,255,0.12)';x.beginPath();x.ellipse(-2,0,6,3,-0.2,0,6.28);x.fill();

  // 腿
  const lAnim=l.st==='walk'?1:0;
  x.strokeStyle=l.dk;x.lineWidth=1.8;x.lineCap='round';
  [-1,3,7].forEach((ly,i)=>{
    const off=lAnim?Math.sin(l.cp+i*1.5)*3:0;
    x.beginPath();x.moveTo(-11,ly);x.lineTo(-17+off,ly+4);x.stroke();
    x.beginPath();x.moveTo(11,ly);x.lineTo(17-off,ly+4);x.stroke();
  });

  // 钳子
  const ca=l.st==='walk'?Math.sin(l.cp)*0.3:l.st==='sit_work'?Math.sin(t*0.015)*0.35:l.st==='coffee'?-0.7:0;
  // 左钳
  x.save();x.translate(-11,1);x.rotate(ca);
  x.strokeStyle=l.color;x.lineWidth=2.2;x.lineCap='round';x.lineJoin='round';
  x.beginPath();x.moveTo(0,0);x.lineTo(-7,5);x.lineTo(-11,2);x.moveTo(-7,5);x.lineTo(-11,8);x.stroke();
  x.restore();
  // 右钳
  x.save();x.translate(11,1);x.rotate(-ca);
  x.strokeStyle=l.color;x.lineWidth=2.2;x.lineCap='round';x.lineJoin='round';
  x.beginPath();x.moveTo(0,0);x.lineTo(7,5);x.lineTo(11,2);x.moveTo(7,5);x.lineTo(11,8);x.stroke();
  x.restore();

  // 头
  x.fillStyle=l.color;x.beginPath();x.ellipse(0,-7,10,8,0,0,6.28);x.fill();

  // 触须
  x.strokeStyle=l.dk;x.lineWidth=1;x.lineCap='round';
  x.beginPath();x.moveTo(-3,-14);x.quadraticCurveTo(-8,-20,-6+Math.sin(t*0.005)*2,-24);x.stroke();
  x.beginPath();x.moveTo(3,-14);x.quadraticCurveTo(8,-20,6+Math.sin(t*0.005+1)*2,-24);x.stroke();

  // 眼睛
  const eyeY=l.st==='sleep'?-7:-9;
  const esy=l.bk?0.15:1;
  x.fillStyle='#fff';
  x.save();x.translate(-4,eyeY);x.scale(1,esy);x.beginPath();x.arc(0,0,3,0,6.28);x.fill();x.restore();
  x.save();x.translate(4,eyeY);x.scale(1,esy);x.beginPath();x.arc(0,0,3,0,6.28);x.fill();x.restore();
  if(!l.bk){
    x.fillStyle='#111';x.beginPath();x.arc(-3.5,eyeY,1.5,0,6.28);x.fill();
    x.beginPath();x.arc(4.5,eyeY,1.5,0,6.28);x.fill();
    // 高光
    x.fillStyle='rgba(255,255,255,0.8)';
    x.beginPath();x.arc(-4,eyeY-1,0.6,0,6.28);x.fill();
    x.beginPath();x.arc(4,eyeY-1,0.6,0,6.28);x.fill();
  }

  // 状态气泡
  if(l.st==='sleep'){x.fillStyle='rgba(255,255,255,0.6)';x.font='7px sans-serif';x.textAlign='center';x.fillText('z Z z',10,-18)}
  if(l.st==='coffee'){x.fillStyle='rgba(255,255,255,0.7)';x.font='8px sans-serif';x.textAlign='center';x.fillText('☕',-14,-14)}
  if(l.st==='sit_work'){/* 敲键盘不用气泡 */}
  if(l.st==='exercise'){x.fillStyle='rgba(255,255,255,0.7)';x.font='7px sans-serif';x.textAlign='center';x.fillText('💪',0,-20)}

  x.restore();
}

// 行为AI
let lastAI=0;
function ai(t){
  if(t-lastAI<3500)return;lastAI=t;
  const idle=L.filter(l=>(l.st==='sit_idle'||l.st==='sit_work')&&!l.mv);
  if(!idle.length)return;
  const l=idle[Math.floor(Math.random()*idle.length)];
  const r=Math.random();
  if(r<0.25){l.st='sit_work';l.actionTimer=6000+Math.random()*8000}
  else if(r<0.45){moveTo(l,coffeeZone,'coffee')}
  else if(r<0.55){moveTo(l,gymZone,'exercise')}
  else if(r<0.65){moveTo(l,toiletZone,'toilet')}
  else if(r<0.75){l.st='sleep';l.actionTimer=8000+Math.random()*6000}
  else if(r<0.85){l.st='sit_idle';l.actionTimer=4000+Math.random()*4000}
  else{l.st='sit_work';l.actionTimer=8000+Math.random()*6000}
}

function moveTo(l,zone,action){
  l.tx=zone.x;l.ty=zone.y;l.mv=true;l.st='walk';l.arriveAction=action;
}

function update(dt,t){
  L.forEach(l=>{
    // 动画相位
    l.bp+=dt*(l.st==='walk'?0.014:0.002);
    l.cp+=dt*(l.st==='walk'?0.011:l.st==='sit_work'?0.008:0.0015);
    // 眨眼
    l.bt-=dt;if(l.bt<=0){l.bk=!l.bk;l.bt=l.bk?80:1500+Math.random()*3000}
    // 行动计时器
    if(l.actionTimer>0){l.actionTimer-=dt;if(l.actionTimer<=0&&l.st!=='walk'){goHome(l)}}
    // 移动
    if(!l.mv)return;
    const dx=l.tx-l.x,dy=l.ty-l.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d<3){
      l.x=l.tx;l.y=l.ty;l.mv=false;
      if(l.arriveAction){l.st=l.arriveAction;l.arriveAction=null;
        l.actionTimer=5000+Math.random()*5000;
      }
      return;
    }
    const spd=1.1*(l.back?0.75:1);
    l.x+=dx/d*spd;l.y+=dy/d*spd;
    l.fr=dx>0;
  });
}

function goHome(l){
  l.tx=l.hx;l.ty=l.hy;l.mv=true;l.st='walk';l.arriveAction='sit_work';
  l.actionTimer=8000+Math.random()*8000;
}

let lt=0;
function loop(t){
  const dt=lt?t-lt:16;lt=t;
  update(dt,t);ai(t);
  drawBg(t);
  // 工位背景层（椅背、桌腿）
  backDesks.forEach(d=>deskBg(d.x,d.y,0.55));
  frontDesks.forEach(d=>deskBg(d.x,d.y,0.75));
  // 其他区域
  coffeeMachine(coffeeZone.x,coffeeZone.y);
  treadmill(gymZone.x,gymZone.y);
  toiletArea(toiletZone.x,toiletZone.y);
  // 龙虾（按Y排序）
  [...L].sort((a,b)=>a.y-b.y).forEach(l=>drawLobster(l,t));
  // 工位前景层（桌面+显示器，遮挡角色下半身）
  L.forEach((l,i)=>{
    const desk=l.back?backDesks[l.back?i:i-3]:frontDesks[i-3];
    if(desk)deskFg(desk.x,desk.y,l.back?0.55:0.75,l.screenContent,t);
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
