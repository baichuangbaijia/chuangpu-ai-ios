name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
        
    - name: Install XcodeGen
      run: |
        which xcodegen || brew install xcodegen
        
    - name: Generate Xcode Project
      run: |
        cd $GITHUB_WORKSPACE
        xcodegen generate
        
    - name: Build and Archive
      run: |
        cd $GITHUB_WORKSPACE
        xcodebuild archive           -project ChuangpuAI.xcodeproj           -scheme ChuangpuAI           -configuration Release           -destination 'generic/platform=iOS'           -archivePath build/ChuangpuAI.xcarchive           CODE_SIGNING_ALLOWED=NO           CODE_SIGN_IDENTITY=""           2>&1 | tail -20
          
    - name: Create IPA with ad-hoc signing
      run: |
        cd $GITHUB_WORKSPACE
        
        # Copy the app from archive
        APP_PATH='build/ChuangpuAI.xcarchive/Products/Applications/ChuangpuAI.app'
        
        # Add ad-hoc code signature to the app
        # This makes it a valid IPA that signing tools can re-sign
        codesign --force --deep --sign - "$APP_PATH" 2>&1 || true
        
        # Create IPA
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r ChuangpuAI.ipa Payload/
        rm -rf Payload
        
        # Show IPA contents
        unzip -l ChuangpuAI.ipa
        ls -la ChuangpuAI.ipa
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ChuangpuAI-IPA
        path: ChuangpuAI.ipa
