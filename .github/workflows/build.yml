name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
        
    - name: Install XcodeGen
      run: |
        which xcodegen || brew install xcodegen
        
    - name: Generate Xcode Project
      run: |
        cd $GITHUB_WORKSPACE
        xcodegen generate
        
    - name: Build and Archive
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p build
        xcodebuild archive           -project ChuangpuAI.xcodeproj           -scheme ChuangpuAI           -configuration Release           -destination 'generic/platform=iOS'           -archivePath build/ChuangpuAI.xcarchive           CODE_SIGNING_ALLOWED=NO           CODE_SIGN_IDENTITY=""           2>&1 | tail -80
          
    - name: Prepare IPA from Archive
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p build/ipa
        APP_PATH=$(find build/ChuangpuAI.xcarchive/Products/Applications -name '*.app' | head -1)
        if [ -n "$APP_PATH" ]; then
          cp -r "$APP_PATH" build/ipa/
          echo "Found app: $APP_PATH"
        else
          echo "No .app found in archive"
          ls -la build/ChuangpuAI.xcarchive/Products/ 2>/dev/null || echo "No Products dir"
          exit 1
        fi
        
    - name: Upload App
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ChuangpuAI-app
        path: build/ipa/*.app
