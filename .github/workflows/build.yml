name: Build iOS App

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
        
    - name: Check XcodeGen
      run: |
        which xcodegen || brew install xcodegen
        
    - name: Generate Xcode Project
      run: |
        cd /Users/runner/work/ChuangpuAI/ChuangpuAI
        xcodegen generate
        
    - name: Build iOS Project
      run: |
        cd /Users/runner/work/ChuangpuAI/ChuangpuAI
        xcodebuild -project ChuangpuAI.xcodeproj -scheme ChuangpuAI -configuration Release -destination 'generic/platform=iOS' build CODE_SIGNING_ALLOWED=NO CODE_SIGN_IDENTITY="" 2>&1 | tail -50
        
    - name: Upload Build Artifacts
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: ChuangpuAI.ipa
        path: build/Release-iphoneos/*.ipa
