name: Build iOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcodebuild -version
        
    - name: Install XcodeGen
      run: |
        which xcodegen || brew install xcodegen
        
    - name: Generate Xcode Project
      run: |
        cd $GITHUB_WORKSPACE
        xcodegen generate
        
    - name: Build and Archive
      run: |
        cd $GITHUB_WORKSPACE
        xcodebuild archive           -project ChuangpuAI.xcodeproj           -scheme ChuangpuAI           -configuration Release           -destination 'generic/platform=iOS'           -archivePath build/ChuangpuAI.xcarchive           CODE_SIGNING_ALLOWED=NO           CODE_SIGN_IDENTITY=""           2>&1 | tail -20
          
    - name: List Archive Contents
      run: |
        cd $GITHUB_WORKSPACE
        find build/ChuangpuAI.xcarchive/Products/Applications/ChuangpuAI.app -type f | head -30
        echo "---"
        ls -la build/ChuangpuAI.xcarchive/Products/Applications/ChuangpuAI.app/
        
    - name: Package IPA
      run: |
        cd $GITHUB_WORKSPACE
        mkdir -p Payload
        cp -r build/ChuangpuAI.xcarchive/Products/Applications/ChuangpuAI.app Payload/
        # Create basic code signature structure so iOS accepts the bundle
        mkdir -p Payload/ChuangpuAI.app/_CodeSignature
        echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict></dict></plist>' > Payload/ChuangpuAI.app/_CodeSignature/CodeResources
        zip -r ChuangpuAI.ipa Payload/
        rm -rf Payload
        ls -la ChuangpuAI.ipa
        
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: ChuangpuAI-IPA
        path: ChuangpuAI.ipa
